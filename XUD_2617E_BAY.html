<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#080f1a;color:#c8dff0;font-family:"맑은 고딕",Consolas,sans-serif}

/* ── 전체 레이아웃: 헤더 고정 + 나머지 꽉채움 ── */
.wrap{display:flex;flex-direction:column;height:100vh;width:100vw}

/* ── 헤더 ── */
.hdr{
  flex-shrink:0;
  background:#060c16;border-bottom:2px solid #2e5a8a;
  padding:6px 16px;display:flex;align-items:center;gap:16px;
}
.ship-name{font-size:15px;font-weight:900;color:#7ec8f0;letter-spacing:1px}
.voyage{font-size:10px;color:#5a8ab0;margin-top:1px}
.dot{width:8px;height:8px;border-radius:50%;background:#2dba52;animation:blink 1.4s infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.sync-t{font-size:10px;color:#3a6a8a}
.stat{text-align:center;min-width:44px;flex-shrink:0}
.stat-n{font-size:18px;font-weight:900;line-height:1}
.stat-l{font-size:8px;color:#4a7a9b;font-weight:700;letter-spacing:.3px;margin-top:1px}
.vline{width:1px;height:28px;background:#1e3a5a;flex-shrink:0}
.prog-wrap{flex:1;max-width:200px}
.prog-bg{background:#0c1a28;border-radius:4px;height:10px;overflow:hidden;border:1px solid #1e3a5a}
.prog-fill{background:linear-gradient(90deg,#0b5a22,#2dba52);height:100%;border-radius:4px;transition:width .5s}
.prog-txt{font-size:10px;color:#5a8ab0;margin-top:2px;text-align:right;font-weight:700}
.leg{display:flex;align-items:center;gap:4px;font-size:10px;color:#5a8ab0;font-weight:600;flex-shrink:0}
.lb{width:14px;height:10px;border-radius:1px;border:1.5px solid;flex-shrink:0}

/* ── 선박 영역 ── */
.ship-area{
  flex:1;display:flex;align-items:stretch;overflow:hidden;padding:6px 10px;gap:0;
}

/* 선수/선미 */
.ship-end{
  width:32px;flex-shrink:0;
  background:#0c1a28;border:2px solid #2e5a8a;
  display:flex;align-items:center;justify-content:center;
  writing-mode:vertical-rl;font-size:9px;font-weight:900;
  color:#2e5a8a;letter-spacing:2px;
}
.stern{border-radius:12px 0 0 12px;border-right:none}
.bow  {border-radius:0 12px 12px 0;border-left:none}

/* ── 선박 본체 ── */
.ship-main{
  flex:1;display:flex;flex-direction:column;
  border:2px solid #2e5a8a;background:#0c1624;
  overflow:hidden;
}

/* DECK 섹션 */
.deck-sec{
  flex-shrink:0;
  background:#0a1e34;
  border-bottom:3px solid #2e5a8a;
  display:flex;flex-direction:column;
}
.deck-lbl{
  font-size:8px;color:#3a7ab0;font-weight:900;letter-spacing:2px;
  text-align:center;padding:2px 0;background:#060f1e;border-bottom:1px solid #1a3050;
}
.deck-bays{display:flex;flex:1}

/* HOLD 섹션 */
.hold-sec{
  flex:1;display:flex;flex-direction:column;overflow:hidden;
}
.hold-lbl{
  font-size:8px;color:#2a5a7a;font-weight:900;letter-spacing:2px;
  text-align:center;padding:2px 0;background:#060f1e;border-bottom:1px solid #1a3050;flex-shrink:0;
}
.hold-bays{display:flex;flex:1;overflow:hidden}

/* ── 베이 컬럼 ── */
.bay-col{
  flex:1;display:flex;flex-direction:column;
  border-right:2px solid #1e3a5a;
  position:relative;
}
.bay-col:last-child{border-right:none}
/* 홀수/짝수 베이 배경 구분 */
.bay-col.even{background:rgba(255,255,255,.012)}
.bay-col.odd {background:rgba(0,0,0,.1)}

.bay-lbl{
  font-size:8px;font-weight:900;color:#4a8ab5;
  text-align:center;padding:2px 0;
  background:#08121e;border-bottom:1px solid #1a3050;
  letter-spacing:.5px;flex-shrink:0;
}

/* 셀 그리드 */
.cell-grid{flex:1;display:flex;flex-direction:column;padding:2px;gap:2px;overflow:hidden}
.cell-row{display:flex;gap:2px;flex:1}

/* 컨테이너 셀 */
.cell{
  flex:1;border-radius:3px;border:1.5px solid;
  cursor:pointer;position:relative;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  overflow:hidden;transition:all .1s;min-width:0;
}
.cell:hover{filter:brightness(1.4);z-index:20;transform:scale(1.04)}
.cell.empty{opacity:.15;cursor:default;pointer-events:none;border-style:dashed}

/* 상태 색상 */
.st-normal{background:#122038;border-color:#1e4060}
.st-done  {background:#082a14;border-color:#2dba52}
.st-rf    {background:#081830;border-color:#1a6aff}
.st-dg    {background:#201200;border-color:#cc7700}
.st-xray  {background:#200808;border-color:#cc2222}
.st-done.st-rf  {background:#062a1a;border-color:#00bb77}
.st-done.st-dg  {background:#182000;border-color:#88bb00}
.st-done.st-xray{background:#1a1000;border-color:#cc8800}

/* 셀 내용 */
.c-num{font-size:6.5px;color:rgba(255,255,255,.45);line-height:1;font-family:Consolas}
.c-id {font-size:8px;font-weight:800;color:#fff;line-height:1.1;font-family:Consolas;letter-spacing:.3px}
.c-sz {font-size:6px;color:rgba(255,255,255,.6);line-height:1}
.c-tick{position:absolute;top:1px;right:2px;font-size:9px;color:#2dba52;font-weight:900;line-height:1}
.c-sp{position:absolute;bottom:0;left:0;right:0;text-align:center;font-size:6px;font-weight:900;padding:1px 0;letter-spacing:.3px}
.sp-rf  {background:#0055bb;color:#aaccff}
.sp-dg  {background:#884400;color:#ffcc88}
.sp-xray{background:#880000;color:#ffaaaa}

/* 팝업 */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200}
.popup{
  display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:#0c1a2c;border:2px solid #2e6da4;border-radius:10px;
  padding:16px;z-index:201;min-width:260px;
  box-shadow:0 4px 30px rgba(0,150,255,.15);
}
.pop-x{position:absolute;top:8px;right:12px;cursor:pointer;color:#5a8ab0;font-size:18px;line-height:1}
.pop-cntr{font-size:14px;font-weight:900;color:#7ec8f0;margin-bottom:10px;font-family:Consolas;padding-right:20px}
.pop-row{display:flex;justify-content:space-between;gap:12px;font-size:11px;padding:4px 0;border-bottom:1px solid #1a3050}
.pop-row:last-child{border:none}
.pop-l{color:#5a8ab0}
.pop-v{color:#c8dff0;font-weight:700;font-family:Consolas;text-align:right}
.pop-done{color:#2dba52;font-weight:900}
.pop-rem {color:#e74c3c;font-weight:900}
</style>
</head>
<body>
<div class="wrap">

<!-- 헤더 -->
<div class="hdr">
  <div>
    <div class="ship-name">XINQUNDAO V.2617E</div>
    <div class="voyage">DLC &#8594; 평택(PTK) &nbsp;|&nbsp; 양하 275개</div>
  </div>
  <div class="vline"></div>
  <div class="stat"><div class="stat-n" style="color:#7ec8f0" id="sTotal">275</div><div class="stat-l">전체</div></div>
  <div class="stat"><div class="stat-n" style="color:#2dba52" id="sDone">0</div><div class="stat-l">완료</div></div>
  <div class="stat"><div class="stat-n" style="color:#e74c3c" id="sRem">275</div><div class="stat-l">잔여</div></div>
  <div class="vline"></div>
  <div class="stat"><div class="stat-n" style="color:#1a8aff" id="sRf">25</div><div class="stat-l">RF</div></div>
  <div class="stat"><div class="stat-n" style="color:#cc7700" id="sDg">2</div><div class="stat-l">DG</div></div>
  <div class="stat"><div class="stat-n" style="color:#cc2222" id="sXr">3</div><div class="stat-l">XRAY</div></div>
  <div class="vline"></div>
  <div class="prog-wrap">
    <div class="prog-bg"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    <div class="prog-txt" id="progTxt">0 / 275 (0%)</div>
  </div>
  <div class="vline"></div>
  <!-- 범례 -->
  <div class="leg"><div class="lb" style="background:#122038;border-color:#1e4060"></div>미완료</div>
  <div class="leg"><div class="lb" style="background:#082a14;border-color:#2dba52"></div>완료</div>
  <div class="leg"><div class="lb" style="background:#081830;border-color:#1a6aff"></div>RF</div>
  <div class="leg"><div class="lb" style="background:#201200;border-color:#cc7700"></div>DG</div>
  <div class="leg"><div class="lb" style="background:#200808;border-color:#cc2222"></div>XRAY</div>
  <div class="vline"></div>
  <div class="dot"></div>
  <div style="font-size:10px;color:#2dba52;font-weight:700">LIVE</div>
  <div class="sync-t" id="syncT">동기화 중...</div>
</div>

<!-- 선박 영역 -->
<div class="ship-area">
  <div class="ship-end stern">STERN</div>
  <div class="ship-main" id="shipMain"></div>
  <div class="ship-end bow">BOW</div>
</div>

</div><!-- wrap -->

<!-- 팝업 -->
<div class="overlay" id="overlay" onclick="closePopup()"></div>
<div class="popup" id="popup">
  <span class="pop-x" onclick="closePopup()">&#10005;</span>
  <div class="pop-cntr" id="popCntr"></div>
  <div id="popBody"></div>
</div>

<script>
var BAYS      = JSON.parse(document.getElementById('JBAYS').textContent);
var BASE_DATA = JSON.parse(document.getElementById('JDATA').textContent);
var FB_URL    = "https://greenmarine-ee29a-default-rtdb.asia-southeast1.firebasedatabase.app";
var FB_PATH   = "XUD_2617E";
var fbChecked = {};
var fbSeal    = {};
var baseMap   = {};
BASE_DATA.forEach(function(r){baseMap[r.cntr]=r;});

var BAY_ORDER  = Object.keys(BAYS).sort();
var HOLD_TIERS = [6,4,2];

// ── 선박 구조 빌드 ─────────────────────────────
function buildShip(){
  var main = document.getElementById('shipMain');

  // DECK 섹션
  var deckSec = document.createElement('div');
  deckSec.className='deck-sec';
  var dl=document.createElement('div');dl.className='deck-lbl';dl.textContent='▲  ON DECK';
  deckSec.appendChild(dl);
  var deckBays=document.createElement('div');deckBays.className='deck-bays';
  BAY_ORDER.forEach(function(bay,i){
    deckBays.appendChild(buildCol(bay,i,'deck'));
  });
  deckSec.appendChild(deckBays);
  main.appendChild(deckSec);

  // HOLD 섹션
  var holdSec=document.createElement('div');
  holdSec.className='hold-sec';
  var hl=document.createElement('div');hl.className='hold-lbl';hl.textContent='▼  UNDER DECK  (HOLD)';
  holdSec.appendChild(hl);
  var holdBays=document.createElement('div');holdBays.className='hold-bays';
  BAY_ORDER.forEach(function(bay,i){
    holdBays.appendChild(buildCol(bay,i,'hold'));
  });
  holdSec.appendChild(holdBays);
  main.appendChild(holdSec);
}

function buildCol(bay,idx,mode){
  var col=document.createElement('div');
  col.className='bay-col '+(idx%2===0?'even':'odd');
  col.id=mode+'-'+bay;

  var lbl=document.createElement('div');
  lbl.className='bay-lbl';
  lbl.textContent='B'+parseInt(bay);
  col.appendChild(lbl);

  var items=(BAYS[bay]||[]).filter(function(c){
    return mode==='deck'?c.tier===82:c.tier!==82;
  });

  var grid=document.createElement('div');grid.className='cell-grid';

  if(mode==='deck'){
    var maxR=items.length?Math.max.apply(null,items.map(function(c){return c.row;})):8;
    var row=document.createElement('div');row.className='cell-row';
    for(var r=1;r<=maxR;r++){
      var c=items.find(function(x){return x.row===r;});
      row.appendChild(c?mkCell(c):mkEmpty());
    }
    grid.appendChild(row);
  } else {
    var maxR2=items.length?Math.max.apply(null,items.map(function(c){return c.row;})):7;
    HOLD_TIERS.forEach(function(t){
      var row2=document.createElement('div');row2.className='cell-row';
      for(var r=1;r<=maxR2;r++){
        var c=items.find(function(x){return x.row===r&&x.tier===t;});
        row2.appendChild(c?mkCell(c):mkEmpty());
      }
      grid.appendChild(row2);
    });
  }
  col.appendChild(grid);
  return col;
}

function mkCell(c){
  var done=!!fbChecked[c.cntr];
  var cls='cell st-'+c.type+(done?' st-done':'');
  var el=document.createElement('div');
  el.className=cls;
  el.dataset.cntr=c.cntr;
  el.onclick=function(){showPopup(c.cntr);};

  if(done){var tk=document.createElement('span');tk.className='c-tick';tk.textContent='✔';el.appendChild(tk);}

  var num=document.createElement('div');num.className='c-num';num.textContent='#'+c.no;
  var id =document.createElement('div');id.className='c-id'; id.textContent=c.cntr.slice(-4);
  var sz =document.createElement('div');sz.className='c-sz'; sz.textContent=c.size;
  el.appendChild(num);el.appendChild(id);el.appendChild(sz);

  if(c.type!=='normal'){
    var sp=document.createElement('div');
    sp.className='c-sp sp-'+c.type;
    sp.textContent=c.type==='rf'?'RF':c.type==='dg'?'DG':'X-RAY';
    el.appendChild(sp);
  }
  return el;
}

function mkEmpty(){
  var el=document.createElement('div');el.className='cell empty st-normal';return el;
}

// ── 셀 갱신 ───────────────────────────────────
function refreshCells(){
  document.querySelectorAll('.cell[data-cntr]').forEach(function(el){
    var cntr=el.dataset.cntr;
    var done=!!fbChecked[cntr];
    var wasDone=el.classList.contains('st-done');
    if(done===wasDone) return;
    el.classList.toggle('st-done',done);
    var tk=el.querySelector('.c-tick');
    if(done&&!tk){tk=document.createElement('span');tk.className='c-tick';tk.textContent='✔';el.insertBefore(tk,el.firstChild);}
    else if(!done&&tk){tk.remove();}
  });
}

// ── 팝업 ──────────────────────────────────────
function showPopup(cntr){
  var base=baseMap[cntr]||{};
  var done=fbChecked[cntr]||'';
  var seal=fbSeal[cntr]||base.seal||'-';
  document.getElementById('popCntr').textContent=cntr;
  var rows=[
    ['실번호',seal],['규격',base.size||'-'],['위치',base.pos||'-'],
    ['특수',base.special||'없음'],
    ['상태',done?'<span class="pop-done">&#10003; 완료</span>':'<span class="pop-rem">&#9650; 미완료</span>']
  ];
  if(base.xray) rows.push(['XRAY','&#9888; 대상']);
  var h='';rows.forEach(function(r){h+='<div class="pop-row"><span class="pop-l">'+r[0]+'</span><span class="pop-v">'+r[1]+'</span></div>';});
  document.getElementById('popBody').innerHTML=h;
  document.getElementById('popup').style.display='block';
  document.getElementById('overlay').style.display='block';
}
function closePopup(){
  document.getElementById('popup').style.display='none';
  document.getElementById('overlay').style.display='none';
}

// ── Firebase ───────────────────────────────────
function loadFB(){
  var xhr=new XMLHttpRequest();
  xhr.open('GET',FB_URL+'/'+FB_PATH+'/in.json?t='+Date.now(),true);
  xhr.timeout=10000;
  xhr.onreadystatechange=function(){
    if(xhr.readyState!==4) return;
    if(xhr.status===200){
      try{
        var rows=JSON.parse(xhr.responseText)||{};
        fbChecked={};fbSeal={};
        Object.keys(rows).forEach(function(k){
          var r=rows[k];if(!r||!r.cntr)return;
          if(r.checked)fbChecked[r.cntr]=r.checked;
          if(r.seal)   fbSeal[r.cntr]=r.seal;
        });
        refreshCells();
        updateStats();
        var n=new Date(),p=function(x){return x<10?'0'+x:''+x;};
        document.getElementById('syncT').textContent=p(n.getHours())+':'+p(n.getMinutes())+':'+p(n.getSeconds());
      }catch(e){console.error(e);}
    }
  };
  xhr.send();
}

function updateStats(){
  var all=[];Object.keys(BAYS).forEach(function(b){all=all.concat(BAYS[b]);});
  var total=all.length;
  var done=all.filter(function(c){return fbChecked[c.cntr];}).length;
  var pct=Math.round(done/total*100);
  document.getElementById('sDone').textContent=done;
  document.getElementById('sRem').textContent=total-done;
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progTxt').textContent=done+' / '+total+' ('+pct+'%)';
}

buildShip();
loadFB();
setInterval(loadFB,10000);
</script>
</body>
</html>
