<script>
const DATA=JSON.parse(document.getElementById('JDATA').textContent);
let curQuery='',curFilter='all';

function fmtWgt(w){return w?w.toLocaleString()+'kg':'-'}

function matches(r,q,f){
  if(q&&!r.cntr.slice(-4).includes(q)&&!r.cntr.includes(q))return false;
  if(f==='all')return true;
  if(f==='FULL')return r.fe==='F';
  if(f==='SP')return!!r.special;          // 특수화물 전체
  if(f==='RF')return r.special&&r.special.startsWith('RF');  // 리퍼만
  if(f==='XRAY')return r.special==='XRAY'; // XRAY만
  if(f===r.size)return true;
  if(f===r.oper)return true;
  return false;
}

function renderCard(r){
  const isRf=r.special&&r.special.startsWith('RF'),isXr=r.special==='XRAY';
  const hdrCls='card-hdr'+(isXr?' xray':isRf?' rf':'');
  const szBadge='badge '+(r.size==='40HQ'?'hq':r.size==='20DC'?'dc':'rf');
  const sp=r.special?`<tr><td>특수화물</td><td><span class="${isXr?'xr-val':'sp-val'}">${r.special}</span></td></tr>`:'';
  return `<div class="card" id="card${r.no}">
    <div class="${hdrCls}" onclick="tog(${r.no})">
      <span style="color:#888;font-size:12px;min-width:28px">#${r.no}</span>
      <span class="cntr-no">${r.cntr}</span>
      <span class="${szBadge}">${r.size}</span>
      ${isXr?'<span class="badge xray">XRAY</span>':''}
      ${isRf?`<span class="badge rf">🧊${r.rf}</span>`:''}
    </div>
    <div class="detail" id="d${r.no}">
      <table>
        <tr><td>실번호</td><td>
          <div id="sv${r.no}" class="seal-wrap">
            <span class="seal-val seal-big" id="sval${r.no}">${r.seal||'- '}</span>
            ${r.seal&&r.seal!==r._origSeal?'<span class="mod-badge">수정됨</span>':''}
            <button class="edit-btn" onclick="startEdit(${r.no});event.stopPropagation()">✏️</button>
          </div>
          <div id="se${r.no}" class="edit-inp">
            <input id="si${r.no}" type="text" value="${r.seal}" onclick="event.stopPropagation()">
            <button class="save-btn" onclick="saveSeal(${r.no});event.stopPropagation()">저장</button>
            <button class="cancel-btn" onclick="cancelEdit(${r.no});event.stopPropagation()">취소</button>
          </div>
        </td></tr>
        <tr><td>규격</td><td>${r.size} / ${r.fe==='F'?'FULL':'EMPTY'}</td></tr>
        <tr><td>선내위치</td><td><span class="pos-val">${r.pos}</span></td></tr>
        <tr><td>중량</td><td>${fmtWgt(r.wgt)}</td></tr>
        <tr><td>오퍼레이터</td><td>${r.oper}</td></tr>
        <tr><td>구분</td><td>${r.gui}</td></tr>
        ${sp}
      </table>
    </div>
  </div>`;
}

function render(){
  const q=curQuery,f=curFilter;
  const fil=DATA.filter(r=>matches(r,q,f));
  document.getElementById('rbar').textContent=(q||f!=='all')?`검색결과: ${fil.length}개`:`전체 ${fil.length}개`;
  if(!fil.length){
    document.getElementById('list').innerHTML='<div class="empty"><div class="icon">🔍</div><div>검색 결과 없음</div></div>';
    return;
  }
  document.getElementById('list').innerHTML=fil.map(renderCard).join('');
}

function tog(no){const el=document.getElementById('d'+no);if(el)el.style.display=el.style.display==='block'?'none':'block';}
function startEdit(no){document.getElementById('sv'+no).style.display='none';document.getElementById('se'+no).style.display='flex';document.getElementById('si'+no).focus();}
function cancelEdit(no){document.getElementById('se'+no).style.display='none';document.getElementById('sv'+no).style.display='flex';const r=DATA.find(x=>x.no===no);if(r)document.getElementById('si'+no).value=r.seal;}
function saveSeal(no){
  const v=document.getElementById('si'+no).value.trim();
  if(!v){alert('실번호 입력');return;}
  const r=DATA.find(x=>x.no===no);if(!r)return;
  r.seal=v;
  const card=document.getElementById('card'+no);
  if(card){const wasOpen=document.getElementById('d'+no).style.display==='block';card.outerHTML=renderCard(r);if(wasOpen)document.getElementById('d'+no).style.display='block';}
}

document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');curFilter=t.dataset.f;render();
  });
});

const inp=document.getElementById('inp');
let lastVal='';
function chk(){const v=inp.value.replace(/\D/g,'').slice(-4);if(v!==lastVal){lastVal=v;curQuery=v;render();}}
inp.addEventListener('input',chk);inp.addEventListener('keyup',chk);
setInterval(chk,100);
// ── 접속자 이름 처리
// ◀ 직원 DB (이름 → 직책 자동 매핑)
const STAFF_DB = {
  '신성호':'대표이사','표인수':'상무이사','황창웅':'이사','최장욱':'실장',
  '이현규':'부장·수석검수','김명보':'부장·수석검수','권수안':'차장',
  '정영배':'차장','오승택':'차장·수석검수','성창모':'과장·수석검수',
  '이강익':'과장·수석검수','김유신':'대리','김석':'대리',
  '전우수':'대리·수석검수','김성일':'대리·부수석','장문영':'검수',
  '김판석':'검수','최관식':'검수','김홍규':'검수','한성호':'검수',
  '오종하':'검수','이인철':'검수','이종부':'검수','이종현':'검수',
  '송제욱':'검수','최원형':'검수'
};

function setName(){
  const name=document.getElementById('nameInp').value.trim();
  if(!name){document.getElementById('nameInp').focus();return;}
  const role=STAFF_DB[name]||'검수';
  localStorage.setItem('gm_user_2606e',JSON.stringify({name,role}));
  document.getElementById('userNameDisp').textContent=name;
  document.getElementById('userRoleDisp').textContent=role;
  document.getElementById('modalBg').style.display='none';
}
function reEnterName(){
  const saved=JSON.parse(localStorage.getItem('gm_user_2606e')||'{}');
  document.getElementById('nameInp').value=saved.name||'';
  if(saved.name) updateRolePreview(saved.name);
  document.getElementById('modalBg').style.display='flex';
  setTimeout(()=>document.getElementById('nameInp').focus(),100);
}
function updateRolePreview(name){
  const role=STAFF_DB[name];
  const el=document.getElementById('rolePreview');
  if(!el) return;
  if(role) el.textContent='👤 '+role;
  else el.textContent=name?'⚠ 등록되지 않은 이름':'';
}
document.getElementById('nameInp').addEventListener('input',function(){updateRolePreview(this.value.trim());});
document.getElementById('nameInp').addEventListener('keyup',function(e){if(e.key==='Enter')setName();});
(function(){
  const saved=JSON.parse(localStorage.getItem('gm_user_2606e')||'null');
  if(saved&&saved.name){
    document.getElementById('userNameDisp').textContent=saved.name;
    document.getElementById('userRoleDisp').textContent=saved.role||STAFF_DB[saved.name]||'검수';
    document.getElementById('modalBg').style.display='none';
  }
})();

// ── 로그아웃 ──────────────────────────────────
function doLogout(){
  if(!confirm('로그아웃 하시겠습니까?')) return;
  localStorage.removeItem('gm_user_2606e');
  document.getElementById('userNameDisp').textContent='-';
  document.getElementById('userRoleDisp').textContent='-';
  document.getElementById('modalBg').style.display='flex';
  setTimeout(()=>document.getElementById('nameInp').focus(),100);
}

// ── 카메라 조회 (Tesseract 고인식률) ────────
var camStream=null,camTimer=null,camBusy=false,camLast='';

function openCamera(){
  var m=document.getElementById('camModal');
  m.style.display='flex'; m.style.flexDirection='column';
  document.getElementById('camResult').textContent='';
  document.getElementById('camManual').value='';
  camLast='';
  startCam();
}

function closeCamera(){
  stopCam();
  document.getElementById('camModal').style.display='none';
}

function startCam(){
  navigator.mediaDevices.getUserMedia({
    video:{
      facingMode:{ideal:'environment'},
      width:{ideal:1920, min:1280},
      height:{ideal:1080, min:720},
      frameRate:{ideal:15}
    }
  }).then(function(stream){
    camStream=stream;
    // 화질 최적화 설정
    var track=stream.getVideoTracks()[0];
    if(track && track.applyConstraints){
      track.applyConstraints({advanced:[{sharpness:100,contrast:100}]}).catch(function(){});
    }
    var v=document.getElementById('camVideo');
    v.srcObject=stream;
    v.onloadedmetadata=function(){ v.play(); };
    v.onplaying=function(){ startAutoScan(); };
    setTimeout(function(){ if(!camTimer) startAutoScan(); }, 3000);
  }).catch(function(err){
    document.getElementById('camResult').style.color='#FF6B6B';
    document.getElementById('camResult').textContent='📵 카메라 오류 — 직접 입력해주세요';
  });
}

function stopCam(){
  if(camTimer){clearInterval(camTimer);camTimer=null;}
  if(camStream){camStream.getTracks().forEach(function(t){t.stop();});camStream=null;}
  camBusy=false;
}

function startAutoScan(){
  if(camTimer) clearInterval(camTimer);
  var guide=document.getElementById('camGuide');
  if(typeof Tesseract==='undefined'){
    guide.textContent='⏳ OCR 로딩 중...';
    var wait=setInterval(function(){
      if(typeof Tesseract!=='undefined'){
        clearInterval(wait);
        guide.textContent='📸 버튼 또는 자동인식 대기중...';
        camTimer=setInterval(function(){ if(!camBusy) doOCR(); },3000);
      }
    },500);
    return;
  }
  guide.textContent='📸 버튼 또는 자동인식 대기중...';
  camTimer=setInterval(function(){ if(!camBusy) doOCR(); },3000);
}

// 이미지 전처리 - 경량 버전 (폰 최적화)
function preprocessCanvas(srcCanvas){
  var w=srcCanvas.width, h=srcCanvas.height;
  var dst=document.createElement('canvas');
  // 고정 크기로 제한 (너무 크면 느림)
  var maxW=1200;
  var scale=w>maxW ? maxW/w : 1;
  dst.width=Math.round(w*scale);
  dst.height=Math.round(h*scale);
  var ctx=dst.getContext('2d');
  ctx.imageSmoothingEnabled=true;
  ctx.imageSmoothingQuality='high';
  // Canvas 필터로 샤프닝 (GPU 가속, 빠름)
  ctx.filter='contrast(1.4) brightness(1.05)';
  ctx.drawImage(srcCanvas,0,0,dst.width,dst.height);
  ctx.filter='none';
  return dst;
}

function doOCR(){
  var video=document.getElementById('camVideo');
  var canvas=document.getElementById('camCanvas');
  if(!video.srcObject||video.paused||video.videoWidth===0) return;
  camBusy=true;
  var el=document.getElementById('camResult');
  var guide=document.getElementById('camGuide');

  // 원본 캡처
  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;
  var ctx=canvas.getContext('2d');
  ctx.drawImage(video,0,0);

  // 전처리 캔버스 생성
  var processed=preprocessCanvas(canvas);

  guide.textContent='🔍 인식 중...';

  // PSM 6: 단일 텍스트 블록, PSM 11: 낱글자 — 둘 다 시도
  Tesseract.recognize(processed,'eng',{
    logger:function(){},
    tessedit_char_whitelist:'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789',
    tessedit_pageseg_mode:'11',
    preserve_interword_spaces:'0'
  }).then(function(r1){
    var found=parseCntr(r1.data.text);
    if(found){
      handleFound(found,el,guide);
    } else {
      guide.textContent='📸 버튼 또는 자동인식 대기중...';
      el.textContent='';
    }
    camBusy=false;
  }).catch(function(){ camBusy=false; });
}

function handleFound(found,el,guide){
  var match=DATA.find(function(r){return r.cntr===found;});
  if(match&&found!==camLast){
    camLast=found;
    el.textContent='✅ '+match.cntr+' 인식됨!';
    el.style.color='#FFD700';
    guide.textContent='✅ 찾았습니다!';
    if(navigator.vibrate) navigator.vibrate([80,40,80]);
    setTimeout(function(){ applySearch(match.cntr); closeCamera(); },700);
  } else if(!match){
    el.textContent='⚠ '+found+' — 목록에 없음';
    el.style.color='#FFA500';
  }
}

function setZoom(val){
  document.getElementById('zoomVal').textContent=parseFloat(val).toFixed(1)+'x';
  if(!camStream) return;
  var track=camStream.getVideoTracks()[0];
  if(!track) return;
  var caps=track.getCapabilities();
  if(caps.zoom){
    var min=caps.zoom.min, max=caps.zoom.max;
    var z=min+(max-min)*((val-1)/9);
    track.applyConstraints({advanced:[{zoom:z}]}).catch(function(){});
  }
}

function captureNow(){
  camBusy=false;
  document.getElementById('camGuide').textContent='🔍 인식 중...';
  doOCR();
}

function applySearch(cntr){
  const last4=cntr.slice(-4);
  document.getElementById('inp').value=last4;
  curQuery=last4; render();
  setTimeout(()=>{ const c=document.querySelector('.card'); if(c) c.scrollIntoView({behavior:'smooth'}); },300);
}

function parseCntr(text){
  const up=text.toUpperCase().replace(/[^A-Z0-9]/g,'');
  // 완전 패턴: 영문4 + 숫자7
  const m=up.match(/[A-Z]{4}[0-9]{7}/g);
  if(m) return m[0];
  // O↔0, I↔1 교정 후 재시도
  const fixed=up.replace(/O/g,'0').replace(/I(?=[0-9])/g,'1').replace(/(?<=[A-Z]{4})O/g,'0');
  const m2=fixed.match(/[A-Z]{4}[0-9]{7}/g);
  if(m2) return m2[0];
  return null;
}
function camManualSearch(val){
  const v=val.replace(/\s/g,'').toUpperCase();
  const el=document.getElementById('camResult');
  if(v.length<2){el.textContent='';return;}
  const found=DATA.filter(r=>r.cntr.includes(v)||r.cntr.slice(-4)===v.slice(-4));
  if(found.length>0){
    el.textContent='✅  '+found[0].cntr;
    el.style.color='#FFD700';
    if(v.length>=4){
      if(navigator.vibrate) navigator.vibrate(80);
      setTimeout(()=>{ applySearch(found[0].cntr); closeCamera(); },600);
    }
  } else {
    el.textContent=v.length>=3?'❌ 없음':'';
    el.style.color='#FF6B6B';
  }
}

render();
</script>
