<script>

function fmtWgt(w){return w?w.toLocaleString()+'kg':'-'}

function matches(r,q,f){
  if(q&&!r.cntr.slice(-4).includes(q)&&!r.cntr.includes(q))return false;
  if(f==='all')return true;
  if(f==='FULL')return r.fe==='F';
  if(f==='SP')return!!r.special;          // 특수화물 전체
  if(f==='RF')return r.special&&r.special.startsWith('RF');  // 리퍼만
  if(f==='XRAY')return r.special==='XRAY'; // XRAY만
  if(f===r.size)return true;
  if(f===r.oper)return true;
  return false;
}

let camStream=null,camTimer=null,camBusy=false,camLast='';

function openCamera(){
  const m=document.getElementById('camModal');
  m.style.display='flex'; m.style.flexDirection='column';
  document.getElementById('camResult').textContent='';
  document.getElementById('camManual').value='';
  camLast='';
  startCam();
}

function closeCamera(){
  stopCam();
  document.getElementById('camModal').style.display='none';
}

function startCam(){
  navigator.mediaDevices.getUserMedia({
    video:{facingMode:{ideal:'environment'},width:{ideal:1920},height:{ideal:1080}}
  }).then(stream=>{
    camStream=stream;
    const v=document.getElementById('camVideo');
    v.srcObject=stream;
    // 여러 이벤트로 확실하게 시작
    v.onloadedmetadata=()=>{ v.play(); };
    v.onplaying=()=>{ startAutoScan(); };
    // 3초 후에도 안 시작되면 강제 시작
    setTimeout(()=>{ if(!camTimer) startAutoScan(); }, 3000);
  }).catch(err=>{
    document.getElementById('camResult').style.color='#FF6B6B';
    document.getElementById('camResult').textContent='📵 카메라 오류 — 직접 입력해주세요';
  });
}

function stopCam(){
  if(camTimer){clearInterval(camTimer);camTimer=null;}
  if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null;}
  camBusy=false;
}

function startAutoScan(){
  if(camTimer) clearInterval(camTimer);
  const guide=document.getElementById('camGuide');
  if(typeof Tesseract==='undefined'){
    guide.textContent='⏳ OCR 로딩 중...';
    // Tesseract 로딩 기다리기
    const wait=setInterval(()=>{
      if(typeof Tesseract!=='undefined'){
        clearInterval(wait);
        guide.textContent='🔍 자동 스캔 중...';
        camTimer=setInterval(()=>{if(!camBusy) doOCR();},1500);
      }
    },500);
    return;
  }
  guide.textContent='🔍 자동 스캔 중...';
  camTimer=setInterval(()=>{if(!camBusy) doOCR();},1500);
}

function doOCR(){
  const video=document.getElementById('camVideo');
  const canvas=document.getElementById('camCanvas');
  if(!video.srcObject||video.paused||video.videoWidth===0) return;
  camBusy=true;

  // 전처리 없이 원본 그대로 — Tesseract가 컬러 이미지를 더 잘 인식
  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;
  const ctx=canvas.getContext('2d');
  ctx.drawImage(video,0,0);

  const el=document.getElementById('camResult');
  const guide=document.getElementById('camGuide');

  Tesseract.recognize(canvas,'eng',{
    logger:()=>{},
    tessedit_char_whitelist:'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789',
    tessedit_pageseg_mode:'11'  // 낱글자 모드 - 흩어진 텍스트에 강함
  }).then(({data:{text}})=>{
    const found=parseCntr(text);
    if(found){
      const match=DATA.find(r=>r.cntr===found);
      if(match&&found!==camLast){
        camLast=found;
        el.textContent='✅  '+match.cntr+'  인식됨!';
        el.style.color='#FFD700';
        guide.textContent='✅ 찾았습니다!';
        if(navigator.vibrate) navigator.vibrate([80,40,80]);
        setTimeout(()=>{ applySearch(match.cntr); closeCamera(); },700);
      } else if(!match){
        el.textContent='⚠ '+found+' — 목록에 없음';
        el.style.color='#FFA500';
      }
    } else {
      guide.textContent='🔍 자동 스캔 중...';
      el.textContent='';
    }
    camBusy=false;
  }).catch(()=>{ camBusy=false; });
}
function captureNow(){

function applySearch(cntr){

function parseCntr(text){
  const up=text.toUpperCase().replace(/[^A-Z0-9]/g,'');
  // 완전 패턴: 영문4 + 숫자7
  const m=up.match(/[A-Z]{4}[0-9]{7}/g);
  if(m) return m[0];
  // O↔0, I↔1 교정 후 재시도
  const fixed=up.replace(/O/g,'0').replace(/I(?=[0-9])/g,'1').replace(/(?<=[A-Z]{4})O/g,'0');
  const m2=fixed.match(/[A-Z]{4}[0-9]{7}/g);
  if(m2) return m2[0];
  return null;
}
function camManualSearch(val){

      if(navigator.vibrate) navigator.vibrate(80);

    }
  } else {
    el.textContent=v.length>=3?'❌ 없음':'';
    el.style.color='#FF6B6B';
  }
}

var voiceRecog = null;
var voiceActive = false;
var voiceToastTimer = null;

function toggleVoice() {
  if (voiceActive) { stopVoice(); } else { startVoice(); }
}
function startVoice() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showVoiceToast('❌ Chrome 브라우저에서 사용해주세요'); return; }
  voiceRecog = new SR();

    voiceActive = true;
    var btn = document.getElementById('voiceBtn');
    btn.style.background = 'rgba(255,50,50,0.6)';
    btn.style.borderColor = 'rgba(255,80,80,0.9)';

    showVoiceToast('\uD83C\uDFA4 숫자 4자리를 말씀해 주세요');
    // speechSynthesis 권한 미리 확보 (무음 재생)
    if (window.speechSynthesis) {
      var warm = new SpeechSynthesisUtterance(' ');
      warm.volume = 0; warm.lang = 'ko-KR';
      window.speechSynthesis.speak(warm);
    }
  };
  voiceRecog.onresult = function(e) {
    processVoiceInput(e.results[0][0].transcript.replace(/\s/g,''));
  };
  voiceRecog.onerror = function(e) {
    showVoiceToast('❌ ' + e.error + ' — 다시 시도해주세요');
    resetVoiceBtn();
  };
  voiceRecog.onend = function() { resetVoiceBtn(); };
  voiceRecog.start();
}
function stopVoice() {
  if (voiceRecog) { voiceRecog.stop(); voiceRecog = null; }
  resetVoiceBtn();
}
function resetVoiceBtn() {
  voiceActive = false;
  var btn = document.getElementById('voiceBtn');
  if (!btn) return;
  btn.style.background = 'rgba(0,200,100,0.25)';
  btn.style.borderColor = 'rgba(0,200,100,0.6)';
  btn.textContent = '\uD83C\uDFA4';
}
function korToNum(str) {
  if (/^[0-9]+$/.test(str)) return str;
  var map = {'\uC601':'0','\uACF5':'0','\uC77C':'1','\uD558\uB098':'1','\uC774':'2','\uB458':'2','\uC0BC':'3','\uC149':'3','\uC0AC':'4','\uB137':'4','\uC624':'5','\uB2E4\uC12F':'5','\uC721':'6','\uC5EC\uC12F':'6','\uCE60':'7','\uC77C\uACF1':'7','\uD314':'8','\uC5EC\uB35F':'8','\uAD6C':'9','\uC544\uD649':'9'};
  var res = str;
  var keys = Object.keys(map).sort(function(a,b){return b.length-a.length;});
  for (var i=0;i<keys.length;i++) res = res.split(keys[i]).join(map[keys[i]]);
  return res;
}
function processVoiceInput(raw) {
  var digits = korToNum(raw).replace(/[^0-9]/g,'');
  var last4 = digits.slice(-4);
  if (last4.length < 4) {
    showVoiceToast('\u26A0 4자리를 인식 못했어요 ("' + raw + '") — 다시 말씀해 주세요');
    setTimeout(startVoice, 1800);
    return;
  }
  document.getElementById('inp').value = last4;
  curQuery = last4; render();
  var found = DATA.filter(function(r){ return r.cntr.slice(-4) === last4; });
  if (found.length > 0) {
    var r = found[0];
    var isXray = r.xray || (r.special && r.special.indexOf('XRAY') >= 0);
    showVoiceToast('\u2705 ' + r.cntr + ' | 실: ' + r.seal + (isXray ? ' | \u26A0XRAY':''));
    if (navigator.vibrate) navigator.vibrate([80,40,80]);
    if (isXray) {
      speakThen('실번호 ' + sealToSpeech(r.seal) + ' 입니다.', '엑스레이 대상입니다. 실 달아주세요.');
    } else {
      speak('실번호 ' + sealToSpeech(r.seal) + ' 입니다.');
    }
    setTimeout(function(){ var c=document.querySelector('.card'); if(c) c.scrollIntoView({behavior:'smooth'}); }, 300);
  } else {
    showVoiceToast('\u274C ' + last4 + ' — 목록에 없습니다');
    speak(last4 + ' 없습니다');
  }
}
function getFemaleVoice() {
  var voices = window.speechSynthesis.getVoices();
  // 1순위: 고품질 네이티브 한국어 (네비처럼 자연스러운 음성)
  var priority = ['Google 한국의','Google Korean','Yuna','유나','나연','지영'];
  for (var p=0; p<priority.length; p++) {
    for (var i=0;i<voices.length;i++) {
      if (voices[i].lang.indexOf('ko')>=0 && voices[i].name.indexOf(priority[p])>=0) {
        return voices[i];
      }
    }
  }
  // 2순위: 한국어 아무거나
  for (var i=0;i<voices.length;i++) {
    if (voices[i].lang.indexOf('ko')>=0) return voices[i];
  }
  return null;
}
function sealToSpeech(seal) {
  // 숫자→한글 한글자씩, 영문→그대로, 0→공 으로 읽기
  var numMap = {'0':'공','1':'일','2':'이','3':'삼','4':'사','5':'오','6':'육','7':'칠','8':'팔','9':'구'};
  var result = '';
  for (var i=0; i<seal.length; i++) {
    var c = seal[i];
    if (numMap[c]) result += numMap[c] + ' ';
    else result += c + ' ';
  }
  return result.trim();
}
function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(text);
  u.lang = 'ko-KR';
  u.rate = 0.95;
  u.pitch = 1.0;
  u.volume = 1.0;
  // voices 로드 후 선택
  var doSpeak = function() {
    var v = getFemaleVoice();
    if (v) u.voice = v;
    window.speechSynthesis.speak(u);
  };
  if (window.speechSynthesis.getVoices().length > 0) {
    doSpeak();
  } else {
    window.speechSynthesis.onvoiceschanged = function() { doSpeak(); };
  }
}
function speakThen(first, second) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  var u1 = new SpeechSynthesisUtterance(first);
  u1.lang = 'ko-KR'; u1.rate = 0.95; u1.pitch = 1.0; u1.volume = 1.0;
  u1.onend = function() {
    setTimeout(function() {
      var u2 = new SpeechSynthesisUtterance(second);
      u2.lang = 'ko-KR'; u2.rate = 0.95; u2.pitch = 1.0; u2.volume = 1.0;
      var v = getFemaleVoice();
      if (v) u2.voice = v;
      window.speechSynthesis.speak(u2);
    }, 300);
  };
  var doSpeak = function() {
    var v = getFemaleVoice();
    if (v) u1.voice = v;
    window.speechSynthesis.speak(u1);
  };
  if (window.speechSynthesis.getVoices().length > 0) {
    doSpeak();
  } else {
    window.speechSynthesis.onvoiceschanged = function() { doSpeak(); };
  }
}
function showVoiceToast(msg) {
  var t = document.getElementById('voiceToast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'voiceToast';
    t.style.cssText = 'position:fixed;top:68px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.88);color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;font-weight:700;z-index:999;max-width:92%;text-align:center;transition:opacity .3s;box-shadow:0 4px 16px rgba(0,0,0,.4);pointer-events:none';
    document.body.appendChild(t);
  }
  t.textContent = msg; t.style.opacity = '1';
  if (voiceToastTimer) clearTimeout(voiceToastTimer);
  voiceToastTimer = setTimeout(function(){ t.style.opacity='0'; }, 3500);
}

    div.innerHTML = '⚠ 이 앱은 <u>크롬(Chrome) 브라우저</u>에서만 정상 작동합니다.<br>삼성/코멧 브라우저는 음성기능이 지원되지 않습니다.';
    document.body.insertBefore(div, document.body.firstChild);
  }
})();
