<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>OBWH 2619E 검수앱</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
:root {
  --bg:#0a0e1a; --sur:#111827; --sur2:#1e2a3a; --bdr:#2a3a4a;
  --acc:#00d4ff; --acc2:#ff6b35; --grn:#00e676; --yel:#ffd600;
  --red:#ff3d57; --pur:#b388ff; --txt:#e8f0fe; --txt2:#8899aa;
  --mono:'JetBrains Mono',monospace; --font:'Noto Sans KR',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}

/* LOGIN */
#loginScreen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse at 50% 0%,#0d2040,#0a0e1a 70%)}
.login-logo{text-align:center;margin-bottom:40px}
.login-logo .icon{font-size:48px;display:block;margin-bottom:12px;filter:drop-shadow(0 0 20px var(--acc))}
.login-logo h1{font-size:22px;font-weight:900;letter-spacing:2px;color:var(--acc)}
.login-logo p{font-size:12px;color:var(--txt2);margin-top:4px;font-family:var(--mono)}
.login-card{background:var(--sur);border:1px solid var(--bdr);border-radius:16px;padding:32px 24px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.login-card h2{font-size:16px;font-weight:700;margin-bottom:24px;color:var(--txt2);text-align:center;letter-spacing:1px}
.fg{margin-bottom:16px}
.fg label{display:block;font-size:11px;font-weight:700;color:var(--txt2);margin-bottom:6px;letter-spacing:1px;text-transform:uppercase}
.fg input,.fg select{width:100%;background:var(--sur2);border:1px solid var(--bdr);border-radius:8px;padding:12px 14px;font-size:15px;color:var(--txt);font-family:var(--font);outline:none;transition:border-color .2s}
.fg select option{background:var(--sur2)}
.fg input:focus,.fg select:focus{border-color:var(--acc);box-shadow:0 0 0 2px rgba(0,212,255,.15)}
.login-btn{width:100%;background:linear-gradient(135deg,var(--acc),#0080ff);border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;color:#000;cursor:pointer;margin-top:8px;letter-spacing:1px;transition:opacity .2s,transform .1s}
.login-btn:active{transform:scale(.98);opacity:.9}
.login-err{background:rgba(255,61,87,.15);border:1px solid rgba(255,61,87,.4);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--red);margin-top:12px;text-align:center;display:none}

/* MAIN */
#mainApp{display:none}
.topbar{background:var(--sur);border-bottom:1px solid var(--bdr);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-left h1{font-size:14px;font-weight:900;color:var(--acc);font-family:var(--mono)}
.topbar-left p{font-size:10px;color:var(--txt2);margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:6px}
.topbar-right span{font-size:12px;color:var(--txt2)}
.tbtn{background:var(--sur2);border:1px solid var(--bdr);border-radius:6px;padding:5px 10px;font-size:11px;color:var(--txt2);cursor:pointer;font-family:var(--font)}
.tbtn.sync{background:rgba(0,212,255,.1);border-color:rgba(0,212,255,.3);color:var(--acc)}
.tbtn.logout{background:rgba(255,107,53,.1);border-color:rgba(255,107,53,.3);color:var(--acc2)}

/* PROGRESS */
.prog-wrap{padding:8px 16px;background:var(--sur2);border-bottom:1px solid var(--bdr)}
.prog-top{display:flex;justify-content:space-between;font-size:10px;color:var(--txt2);margin-bottom:4px}
.prog-bg{height:5px;background:var(--bdr);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--grn),var(--acc));border-radius:3px;transition:width .4s}

/* STATS */
.stats{padding:10px 16px;background:var(--sur2);border-bottom:1px solid var(--bdr);display:flex;gap:10px;overflow-x:auto;scrollbar-width:none}
.stats::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;background:var(--sur);border:1px solid var(--bdr);border-radius:20px;padding:4px 12px;font-size:11px;font-family:var(--mono);white-space:nowrap}
.chip .v{font-weight:700}
.chip.done .v{color:var(--grn)} .chip.rem .v{color:var(--yel)} .chip.xr .v{color:var(--red)} .chip.tot .v{color:var(--acc)}

/* TABS */
.tabs{background:var(--sur);border-bottom:1px solid var(--bdr);display:flex;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:10px 16px;font-size:12px;font-weight:600;color:var(--txt2);border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:all .2s}
.tab.active{color:var(--acc);border-bottom-color:var(--acc)}

/* SEARCH */
.search{padding:12px 16px;background:var(--sur);border-bottom:1px solid var(--bdr);display:flex;gap:8px}
.search input{flex:1;background:var(--sur2);border:1px solid var(--bdr);border-radius:8px;padding:9px 12px;font-size:14px;color:var(--txt);font-family:var(--mono);outline:none}
.search input:focus{border-color:var(--acc)}
.search input::placeholder{color:var(--txt2);font-family:var(--font)}
.fbtn{background:var(--sur2);border:1px solid var(--bdr);border-radius:8px;padding:9px 12px;font-size:12px;color:var(--txt2);cursor:pointer;font-family:var(--font);flex-shrink:0}
.fbtn.on{border-color:var(--acc);color:var(--acc)}

/* LIST */
.list{padding:8px 0}
.sec-hdr{padding:8px 16px 4px;font-size:10px;font-weight:700;color:var(--txt2);letter-spacing:2px;text-transform:uppercase;display:flex;justify-content:space-between}
.card{margin:4px 12px;background:var(--sur);border:1px solid var(--bdr);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .15s;position:relative}
.card:active{transform:scale(.99)}
.card.done{background:rgba(0,230,118,.08);border-color:rgba(0,230,118,.3);opacity:.75}
.card.xray{border-left:3px solid var(--red)}
.card.dg{border-left:3px solid var(--pur)}
.card.ot{border-left:3px solid var(--yel)}
.chk{width:28px;height:28px;flex-shrink:0;border-radius:50%;border:2px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:14px;background:var(--sur2);transition:all .2s}
.card.done .chk{background:var(--grn);border-color:var(--grn);color:#000}
.cinfo{flex:1;min-width:0}
.cntr-no{font-family:var(--mono);font-size:20px;font-weight:900;color:var(--acc);letter-spacing:1.5px;text-shadow:0 0 10px rgba(0,212,255,.4)}
.cntr-no .lbl{font-size:9px;font-weight:500;color:var(--txt2);display:block;text-shadow:none;letter-spacing:1px}
.card.done .cntr-no{color:var(--txt2);text-shadow:none;text-decoration:line-through}
.seal-no{font-family:var(--mono);font-size:20px;font-weight:900;color:#fff;margin-top:3px;letter-spacing:2px;text-shadow:0 0 12px rgba(0,212,255,.5)}
.seal-no .lbl{font-size:9px;font-weight:500;color:var(--txt2);display:block;text-shadow:none;letter-spacing:1px}
.card.done .seal-no{color:var(--txt2);text-shadow:none;text-decoration:line-through}
.cmeta{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;align-items:center}
.badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;letter-spacing:.5px}
.b20{background:rgba(0,212,255,.15);color:var(--acc)}
.b40{background:rgba(179,136,255,.15);color:var(--pur)}
.bxr{background:rgba(255,61,87,.2);color:var(--red)}
.bdg{background:rgba(179,136,255,.2);color:var(--pur)}
.bot{background:rgba(255,214,0,.2);color:var(--yel)}
.btk{background:rgba(255,107,53,.2);color:var(--acc2)}
.bdmg{background:rgba(255,61,87,.1);color:var(--red);font-style:italic}
.cpos{font-family:var(--mono);font-size:10px;color:var(--txt2);text-align:right;flex-shrink:0}
.cpos .pv{font-size:12px;color:var(--yel);font-weight:700}
.chk-time{font-size:9px;color:var(--grn);margin-top:2px;font-family:var(--mono)}
.done-div{margin:8px 12px;padding:8px 12px;background:rgba(0,230,118,.08);border:1px solid rgba(0,230,118,.2);border-radius:8px;font-size:11px;color:var(--grn);font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.empty{text-align:center;padding:60px 20px;color:var(--txt2);font-size:14px}
.empty .ei{font-size:40px;margin-bottom:12px;display:block}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;align-items:flex-end}
.overlay.open{display:flex}
.sheet{background:var(--sur);border-top:1px solid var(--bdr);border-radius:16px 16px 0 0;width:100%;padding:20px 20px 40px;max-height:90vh;overflow-y:auto}
.sh{width:40px;height:4px;background:var(--bdr);border-radius:2px;margin:0 auto 20px}
.mtitle{font-size:16px;font-weight:700;margin-bottom:2px}
.mcntr{font-family:var(--mono);font-size:13px;color:var(--acc);margin-bottom:16px}
.minfo{background:var(--sur2);border-radius:8px;padding:12px 14px;font-size:12px;color:var(--txt2);line-height:2;font-family:var(--mono);margin-bottom:14px}
.minfo span{color:var(--txt)}
.mf{margin-bottom:12px}
.mf label{display:block;font-size:11px;font-weight:700;color:var(--txt2);margin-bottom:5px;letter-spacing:1px;text-transform:uppercase}
.mf input,.mf select,.mf textarea{width:100%;background:var(--sur2);border:1px solid var(--bdr);border-radius:8px;padding:11px 13px;font-size:14px;color:var(--txt);font-family:var(--mono);outline:none;transition:border-color .2s}
.mf input:focus,.mf select:focus,.mf textarea:focus{border-color:var(--acc)}
.mf select option{background:var(--sur2)}
.mf textarea{resize:vertical;min-height:60px;font-family:var(--font);font-size:13px}
.seal-edit-log{margin-top:8px;background:rgba(0,212,255,.05);border:1px solid rgba(0,212,255,.15);border-radius:8px;padding:8px 12px}
.sel-title{font-size:10px;font-weight:700;color:var(--txt2);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.sel-item{font-size:10px;font-family:var(--mono);color:var(--txt2);padding:3px 0;border-bottom:1px solid var(--bdr);line-height:1.6}
.sel-item:last-child{border-bottom:none}
.sel-item .st{color:var(--yel)} .sel-item .su{color:var(--acc)}
.mbtns{display:flex;gap:8px;margin-top:16px}
.mbtn{flex:1;padding:13px;border-radius:10px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font)}
.mbtn.cancel{background:var(--sur2);color:var(--txt2)}
.mbtn.save{background:var(--acc);color:#000}
.mbtn.chk{background:var(--grn);color:#000}
.mbtn.unchk{background:var(--red);color:#fff}

/* SPECIAL TAB */
.sp-card{margin:4px 12px;background:var(--sur);border:1px solid var(--bdr);border-radius:10px;padding:14px}
.sp-card.xr{border-left:3px solid var(--red)}
.sp-card.dg{border-left:3px solid var(--pur)}
.sp-card.ot{border-left:3px solid var(--yel)}
.sp-title{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.sp-title.xr{color:var(--red)} .sp-title.dg{color:var(--pur)} .sp-title.ot{color:var(--yel)}
.sp-cntr{font-family:var(--mono);font-size:15px;font-weight:700;margin-bottom:4px}
.sp-detail{font-size:11px;color:var(--txt2);line-height:2;font-family:var(--mono)}
.sp-detail span{color:var(--txt)}

/* SYNC BANNER */
#syncBanner{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--sur);border:1px solid var(--bdr);border-radius:8px;padding:8px 16px;font-size:12px;color:var(--txt);z-index:300;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.5);display:none}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-logo">
    <span class="icon">🚢</span>
    <h1>OCEAN BLUE</h1>
    <p>OCEAN BLUE V.2619E · (주)그린마린</p>
  </div>
  <div class="login-card">
    <h2>🔐 로그인</h2>
    <div class="fg">
      <label>이름 선택</label>
      <select id="loginName">
        <option value="">-- 이름을 선택하세요 --</option>
        <option value="신성호">신성호 (대표이사)</option>

        <option value="황창웅">황창웅 (이사)</option>

        <option value="성창모">성창모 (과장·수석검수)</option>
        <option value="이강익">이강익 (과장·수석검수)</option>
        <option value="김유신">김유신 (대리)</option>
        <option value="김석">김 석 (대리)</option>
        <option value="전우수">전우수 (대리·수석검수)</option>
        <option value="김성일">김성일 (대리·부수석)</option>

        <option value="김홍규">김홍규 (검수)</option>
        <option value="한성호">한성호 (검수)</option>
        <option value="오종하">오종하 (검수)</option>
        <option value="이인철">이인철 (검수)</option>
        <option value="이종부">이종부 (검수)</option>
        <option value="이종현">이종현 (검수)</option>

    <div class="fg">
      <label>패스워드 (입사년월일 YYMMDD)</label>

    <div class="login-err" id="loginErr">이름 또는 패스워드가 맞지 않습니다.</div>
  </div>
</div>

<!-- MAIN APP -->
<div id="mainApp">
  <div class="topbar">
    <div class="topbar-left">
      <h1>OBWH V.2619E</h1>
      <p>양하검수 · 난퉁→평택</p>
    </div>
    <div class="topbar-right">

  <div class="stats">

  </div>

  <div class="list" id="listArea"></div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="closeModalOut(event)">
  <div class="sheet" id="modalSheet">

    <div class="mtitle" id="mTitle">상세정보</div>
    <div class="mcntr" id="mCntr"></div>

      <label>특수화물 구분</label>

    <div class="mbtns">
      <button class="mbtn cancel" onclick="closeModal()">취소</button>
      <button class="mbtn save" onclick="saveModal()">저장</button>
      <button class="mbtn chk" id="mChkBtn" onclick="toggleCheck()">✓ 확인</button>
    </div>
  </div>
</div>

<div id="syncBanner"></div>

// ============ STATE ============
const STORE = 'obwh2619e_v3';
let currentUser = null;
let curTab = 'all';
let xrayFilter = false;
let searchQ = '';
let modalNo = null;
let showDone = true;

function loadState() {
  try {
    const s = localStorage.getItem(STORE);
    if (s) return JSON.parse(s);
  } catch(e) {}
  const st = {};
  CONTAINERS_RAW.forEach(c => {
    st[c.cntr] = {
      checked: false, checkTime: null, checkUser: null,
      seal: c.seal, damage: '', spec: c.spec, sealLog: []
    };
  });
  return st;
}
function saveState() { localStorage.setItem(STORE, JSON.stringify(appState)); }
let appState = loadState();

// ============ LOGIN ============
function doLogin() {
  const name = document.getElementById('loginName').value;
  const pw = document.getElementById('loginPw').value;
  const err = document.getElementById('loginErr');
  if (!name) { err.style.display='block'; err.textContent='이름을 선택해주세요.'; return; }
  if (!PW[name]) { err.style.display='block'; err.textContent='등록되지 않은 사용자입니다.'; return; }
  if (PW[name] !== pw) { err.style.display='block'; err.textContent='패스워드가 맞지 않습니다.'; return; }
  err.style.display='none';
  currentUser = name;
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('mainApp').style.display='block';
  document.getElementById('curUser').textContent = name;
  loadFromSheets();
  renderList();
}
document.getElementById('loginPw').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
function doLogout() {
  currentUser = null;
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('mainApp').style.display='none';
  document.getElementById('loginName').value='';
  document.getElementById('loginPw').value='';
}

// ============ TIME ============
function now() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
}

// ============ SYNC ============
async function post(payload) {
  if (!GS_ENABLED) return;
  showBanner('💾 저장 중...');
  try {
    const res = await fetch(GS_URL, {
      method: 'POST',
      headers: {'Content-Type': 'text/plain;charset=utf-8'},
      body: JSON.stringify(payload)
    });
    const txt = await res.text();
    let r;
    try { r = JSON.parse(txt); } catch(e) { r = {status:'error', message: txt}; }
    if (r.status !== 'ok') {
      showBanner('⚠️ 저장 실패: '+(r.message||'알 수 없는 오류'), 5000);
      console.error('Post failed:', r, payload);
    } else {
      showBanner('✅ 저장됨', 1500);
    }
  } catch(e) {
    showBanner('⚠️ 서버 오류 (로컬에는 저장됨) '+e.message, 4000);
    console.error('Post error:', e, payload);
  }
}

async function loadFromSheets() {
  if (!GS_ENABLED) return;
  try {
    showBanner('🔄 최신 데이터 불러오는 중...');
    const res = await fetch(GS_URL + '?voyage=OBWH_2619E');
    const data = await res.json();
    if (data && data.rows) {
      data.rows.forEach(row => {
        if (!appState[row.cntr]) return;
        if (row.seal) appState[row.cntr].seal = row.seal;
        if (row.confirmed && row.confirmed.trim()) {
          const p = row.confirmed.split(' / ');
          appState[row.cntr].checked = true;
          appState[row.cntr].checkUser = p[0]||'';
          appState[row.cntr].checkTime = p[1]||'';
        } else {
          appState[row.cntr].checked = false;
          appState[row.cntr].checkTime = null;
          appState[row.cntr].checkUser = null;
        }
        if (row.spec) appState[row.cntr].spec = row.spec;
        if (row.damage) appState[row.cntr].damage = row.damage;
        if (row.xraySeal) appState[row.cntr].xraySeal = row.xraySeal;
      });
      saveState();
      renderList();
      showBanner('✅ 동기화 완료!', 2000);
    }
  } catch(e) {
    showBanner('⚠️ 서버 연결 실패 (로컬 데이터 사용)', 3000);
  }
}

function showBanner(msg, hideMs) {
  const b = document.getElementById('syncBanner');
  b.textContent = msg; b.style.display = 'block';
  if (hideMs) setTimeout(() => b.style.display='none', hideMs);
}

// ============ RENDER ============
function updateStats() {
  const done = CONTAINERS_RAW.filter(c => appState[c.cntr]?.checked).length;
  const total = CONTAINERS_RAW.length;
  document.getElementById('sDone').textContent = done;
  document.getElementById('sRem').textContent = total - done;
  const pct = Math.round(done/total*100);
  document.getElementById('progPct').textContent = pct+'%';
  document.getElementById('progFill').style.width = pct+'%';
  document.getElementById('progLabel').textContent = `완료 ${done} / 잔여 ${total-done}`;
}

function getFiltered() {
  let list = [...CONTAINERS_RAW];
  if (searchQ) {
    const q = searchQ.toUpperCase();
    list = list.filter(c =>
      c.cntr.slice(-4) === q ||
      c.cntr.toUpperCase().includes(q) ||
      (appState[c.cntr]?.seal||c.seal).toUpperCase().includes(q)
    );
  }
  if (xrayFilter) list = list.filter(c => (appState[c.cntr]?.spec||c.spec)==='RF');
  if (curTab==='pending') list = list.filter(c => !appState[c.cntr]?.checked);
  else if (curTab==='done') list = list.filter(c => appState[c.cntr]?.checked);
  else if (curTab==='xray') list = list.filter(c => (appState[c.cntr]?.spec||c.spec)==='XRAY');
  else if (curTab==='special') list = list.filter(c => (appState[c.cntr]?.spec||c.spec));
  return list;
}

function renderList() {
  updateStats();
  const area = document.getElementById('listArea');
  if (curTab==='special') { renderSpecial(area); return; }
  if (curTab==='xray') { renderXray(area); return; }
  const list = getFiltered();
  if (!list.length) { area.innerHTML='<div class="empty"><span class="ei">🔍</span>결과 없음</div>'; return; }
  const pending = list.filter(c => !appState[c.cntr]?.checked);
  const done = list.filter(c => appState[c.cntr]?.checked);
  let html = '';
  if (curTab !== 'done' && pending.length) {
    html += `<div class="sec-hdr"><span>미완료 (${pending.length})</span></div>`;
    html += pending.map(renderCard).join('');
  }
  if (done.length) {
    if (curTab !== 'done') {
      html += `<div class="done-div" onclick="toggleDoneSection(this)">✅ 완료 (${done.length}개) <span id="doneArrow">${showDone?'▼':'▶'}</span></div>`;
      html += `<div id="doneSect" style="display:${showDone?'block':'none'}">`;
      html += done.map(renderCard).join('');
      html += '</div>';
    } else {
      if (done.length === 0) {
        html += '<div class="empty"><span class="ei">📋</span>완료된 컨테이너가 없습니다.</div>';
      } else {
        html += `<div class="sec-hdr"><span>✅ 완료 ${done.length}개</span><span style="color:var(--acc);font-size:10px">최신순</span></div>`;
        // Show newest first in done tab
        html += done.slice().reverse().map(renderCard).join('');
      }
    }
  }
  if (!html) html = '<div class="empty"><span class="ei">📭</span>해당 항목 없음</div>';
  area.innerHTML = html;
}

function toggleDoneSection(el) {
  showDone = !showDone;
  document.getElementById('doneSect').style.display = showDone?'block':'none';
  document.getElementById('doneArrow').textContent = showDone?'▼':'▶';
}

function renderCard(c) {
  const st = appState[c.cntr];
  const checked = st?.checked;
  const seal = st?.seal || c.seal;
  const spec = st?.spec || c.spec;
  const damage = st?.damage || '';
  let sc = '';
  if (spec==='XRAY') sc='xray';
  else if (spec==='DG/TANK') sc='dg';
  else if (spec==='OT'||spec==='RF'||spec==='FR'||spec==='OOG') sc='ot';
  let badges = spec==='20DC'||c.size.startsWith('20')
    ? `<span class="badge b20">${c.size}</span>`
    : `<span class="badge b40">${c.size}</span>`;
  if (spec==='XRAY') {
    const xcat = c.specDetail ? c.specDetail.replace('XRAY (','').replace(')','') : 'XRAY';
    badges += `<span class="badge bxr">⚠ ${xcat}</span>`;
  }
  else if (spec==='DG/TANK') badges += `<span class="badge bdg">☢ DG/TANK</span>`;
  else if (spec==='OT') badges += `<span class="badge bot">OT</span>`;
  else if (spec==='RF') badges += `<span class="badge" style="background:rgba(0,212,255,.15);color:var(--acc)">❄ RF ${c.specDetail?c.specDetail.replace('RF','').trim():''}</span>`;
  else if (spec==='FR') badges += `<span class="badge bot">FR</span>`;
  else if (spec==='OOG') badges += `<span class="badge bxr">OOG</span>`;
  if (spec==='긴급') badges += `<span class="badge bxr">🚨 긴급</span>`;
  if (damage) badges += `<span class="badge bdmg">🔧 데미지</span>`;
  const posHtml = c.pos ? `<div class="cpos"><div class="pv">${c.pos}</div><div style="font-size:9px">위치</div></div>` : '';
  const chkTime = checked && st.checkTime
    ? `<div class="chk-time">✓ ${st.checkTime} · ${st.checkUser}</div>`
    : (checked ? `<div class="chk-time">✓ 완료</div>` : '');
  const isSeaAir = (st?.spec||c.spec) === 'XRAY' && (c.specDetail||'').includes('Sea & Air');
  const xraySealBadge = st?.xraySeal
    ? `<div style="font-size:10px;color:${isSeaAir?'#00b0ff':'var(--red)'};margin-top:2px;font-family:var(--mono)">${isSeaAir?'✈ 전자SEAL':'🔒 봉인SEAL'}: ${st.xraySeal}</div>`
    : '';
  return `<div class="card ${sc} ${checked?'done':''}" onclick="openModal(${c.no})">
    <div class="chk">${checked?'✓':''}</div>
    <div class="cinfo">
      <div class="cntr-no"><span class="lbl">컨테이너 번호</span>${c.cntr}</div>
      <div class="seal-no"><span class="lbl">실 번 호</span>${seal}</div>
      <div class="cmeta">${badges}</div>
      ${chkTime}
      ${xraySealBadge}
    </div>
    ${posHtml}
  </div>`;
}

function renderXray(area) {
  try {
    // XRAY 컨테이너만 필터 - 원본 spec 기준
    var xrayItems = [];
    for (var i = 0; i < CONTAINERS_RAW.length; i++) {
      var c = CONTAINERS_RAW[i];
      if (c.spec === 'XRAY') {
        xrayItems.push(c);
      }
    }

    if (xrayItems.length === 0) {
      area.innerHTML = '<div class="empty"><span class="ei">🔍</span>XRAY 대상 없음</div>';
      return;
    }

    // 그룹 분류
    var g1 = []; // X-RAY 검색기
    var g2 = []; // Sea & Air 전자SEAL
    var g3 = []; // 즉시검사
    var g4 = []; // 반입후검사
    var g5 = []; // 기타

    for (var j = 0; j < xrayItems.length; j++) {
      var c2 = xrayItems[j];
      var detail = c2.specDetail || '';
      if (detail.indexOf('X-RAY') >= 0) g1.push(c2);
      else if (detail.indexOf('Sea') >= 0) g2.push(c2);
      else if (detail.indexOf('즉시') >= 0) g3.push(c2);
      else if (detail.indexOf('반입') >= 0) g4.push(c2);
      else g5.push(c2);
    }

    var html = '<div class="sec-hdr"><span>⚠ XRAY 대상 총 ' + xrayItems.length + '개</span></div>';

    var groupList = [
      {label:'⚠ X-RAY 검색기', items:g1},
      {label:'✈ 전자 SEAL (Sea & Air)', items:g2},
      {label:'🔍 즉시검사', items:g3},
      {label:'📋 반입후검사', items:g4},
      {label:'❓ 기타', items:g5}
    ];

    for (var k = 0; k < groupList.length; k++) {
      var grp = groupList[k];
      if (grp.items.length === 0) continue;
      html += '<div class="sec-hdr" style="background:rgba(255,61,87,.1);color:var(--red)">';
      html += '<span>' + grp.label + ' (' + grp.items.length + ')</span></div>';

      for (var m = 0; m < grp.items.length; m++) {
        var c3 = grp.items[m];
        var st3 = appState[c3.cntr] || {};
        var seal3 = st3.seal || c3.seal || '';
        var xraySeal3 = st3.xraySeal || '';
        var isSeaAir3 = (c3.specDetail || '').indexOf('Sea') >= 0;
        var sealLabel3 = isSeaAir3 ? '✈ 전자 SEAL' : '🔒 봉인 SEAL';
        var sealColor3 = isSeaAir3 ? '#00b0ff' : '#ff3d57';
        var checked3 = st3.checked ? 'done' : '';
        var sizeBadge = c3.size && c3.size.indexOf('20') === 0 ? 'b20' : 'b40';

        html += '<div class="card xray ' + checked3 + '" onclick="openModal(' + c3.no + ')">';
        html += '<div class="chk">' + (st3.checked ? '✓' : '') + '</div>';
        html += '<div class="cinfo">';
        html += '<div class="cntr-no"><span class="lbl">컨테이너 번호</span>' + c3.cntr + '</div>';
        html += '<div class="seal-no"><span class="lbl">실 번 호</span>' + seal3 + '</div>';
        html += '<div class="cmeta">';
        html += '<span class="badge bxr">⚠ XRAY</span>';
        html += '<span class="badge ' + sizeBadge + '">' + c3.size + '</span>';
        html += '</div>';
        html += '<div style="font-size:11px;color:' + sealColor3 + ';margin-top:3px;font-weight:700">';
        html += sealLabel3 + (xraySeal3 ? ': ' + xraySeal3 : ' - 미입력') + '</div>';
        if (st3.checked && st3.checkTime) {
          html += '<div class="chk-time">✓ ' + st3.checkTime + ' · ' + st3.checkUser + '</div>';
        }
        html += '</div>';
        var pos3 = c3.pos || '-';
        html += '<div class="cpos"><div class="pv">' + pos3 + '</div><div style="font-size:9px">위치</div></div>';
        html += '</div>';
      }
    }

    area.innerHTML = html;

  } catch(err) {
    area.innerHTML = '<div class="empty"><span class="ei">⚠️</span>오류: ' + err.message + '</div>';
  }
}

        var st = appState[c.cntr] || {};

        var temp = c.specDetail || '';
        var wt = c.wt ? c.wt.toLocaleString() + 'kg' : '-';
        html += '<div class="sp-card ot" onclick="openModal(' + c.no + ')">';
        html += '<div class="sp-title ot">❄ RF (리퍼)</div>';

        html += '<div class="sp-detail">';

    }

      html += '<div class="sec-hdr"><span>📐 FR 플랫랙 (' + frItems.length + ')</span></div>';
      for (var i = 0; i < frItems.length; i++) {
        var c = frItems[i];
        var st = appState[c.cntr] || {};
        var seal = st.seal || c.seal || '';
        var wt = c.wt ? c.wt.toLocaleString() + 'kg' : '-';
        html += '<div class="sp-card ot" onclick="openModal(' + c.no + ')">';
        html += '<div class="sp-title ot">📐 FR (플랫랙)</div>';
        html += '<div class="sp-cntr">' + c.cntr + '</div>';
        html += '<div class="sp-detail">';
        html += '실번호: <span>' + seal + '</span> · 위치: <span>' + (c.pos || '-') + '</span><br>';
        html += '규격: <span>' + c.size + '</span> · 중량: <span>' + wt + '</span>';
        html += '</div></div>';
      }
    }

    // ===== 긴급화물 =====
    var urgItems = [];
    for (var i = 0; i < CONTAINERS_RAW.length; i++) {
      if (CONTAINERS_RAW[i].spec === '긴급') urgItems.push(CONTAINERS_RAW[i]);
    }
    if (urgItems.length > 0) {
      html += '<div class="sec-hdr"><span>🚨 긴급화물 (' + urgItems.length + ')</span></div>';
      for (var i = 0; i < urgItems.length; i++) {
        var c = urgItems[i];
        var st = appState[c.cntr] || {};
        var seal = st.seal || c.seal || '';
        var wt = c.wt ? c.wt.toLocaleString() + 'kg' : '-';
        var detail = c.specDetail || '';
        var checked = st.checked ? 'done' : '';
        html += '<div class="sp-card xr ' + checked + '" onclick="openModal(' + c.no + ')">';
        html += '<div class="sp-title xr">🚨 긴급화물</div>';
        html += '<div class="sp-cntr">' + c.cntr + '</div>';
        html += '<div class="sp-detail">';
        html += '실번호: <span>' + seal + '</span> · 위치: <span>' + (c.pos || '-') + '</span><br>';
        html += '규격: <span>' + c.size + '</span> · 중량: <span>' + wt + '</span>';
        if (detail) html += '<br>구분: <span style="color:var(--acc2);font-weight:700">' + detail + '</span>';
        if (st.checked && st.checkTime) html += '<br><span style="color:var(--grn)">✓ ' + st.checkTime + ' · ' + st.checkUser + '</span>';

}


// ============ MODAL ============
function openModal(no) {
  const c = CONTAINERS_RAW.find(x => x.no===no);
  if (!c) return;
  modalNo = no;
  const st = appState[c.cntr];
  const spec = st?.spec||c.spec;
  document.getElementById('mTitle').textContent = `No.${c.no} · ${c.line}`;
  document.getElementById('mCntr').textContent = c.cntr;
  document.getElementById('mInfo').innerHTML =
    `규격: <span>${c.size}</span> · F/E: <span>${c.fe}</span><br>` +
    `위치: <span>${c.pos||'-'}</span> · 중량: <span>${c.wt?c.wt.toLocaleString()+'kg':'-'}</span>`;
  document.getElementById('mSeal').value = st?.seal||c.seal;
  document.getElementById('mDamage').value = st?.damage||'';
  document.getElementById('mSpec').value = spec||'';
  // XRAY 실번호 필드 표시/숨김
  const isXray = spec === 'XRAY';
  document.getElementById('xraySealField').style.display = isXray ? 'block' : 'none';
  document.getElementById('mXraySeal').value = st?.xraySeal || '';
  if (isXray) {
    const detail = c.specDetail || '';
    const isSeaAir = detail.includes('Sea & Air');
    const lbl = document.getElementById('xraySealLabel');
    const inp = document.getElementById('mXraySeal');
    if (isSeaAir) {
      lbl.innerHTML = '✈ Sea & Air · 전자 SEAL 번호';
      lbl.style.color = '#00b0ff';
      inp.style.borderColor = 'rgba(0,176,255,.5)';
      inp.style.background = 'rgba(0,176,255,.08)';
      inp.placeholder = '전자 SEAL 번호 입력';
    } else {
      lbl.innerHTML = '⚠ XRAY · 세관봉인 SEAL 번호';
      lbl.style.color = 'var(--red)';
      inp.style.borderColor = 'rgba(255,61,87,.5)';
      inp.style.background = 'rgba(255,61,87,.08)';
      inp.placeholder = '세관봉인 SEAL 번호 입력';
    }
  }
  const btn = document.getElementById('mChkBtn');
  if (st?.checked) { btn.textContent='✕ 완료취소'; btn.className='mbtn unchk'; }
  else { btn.textContent='✓ 확인'; btn.className='mbtn chk'; }
  // seal log
  const logs = (st?.sealLog||[]).filter(l=>l.type==='seal');
  if (logs.length) {
    document.getElementById('sealLogWrap').style.display='block';
    document.getElementById('sealLogItems').innerHTML = logs.slice().reverse().slice(0,5).map(l=>
      `<div class="sel-item"><span class="st">${l.time}</span> <span class="su">${l.user}</span> ${l.from} → ${l.to}</div>`
    ).join('');
  } else {
    document.getElementById('sealLogWrap').style.display='none';
  }
  document.getElementById('overlay').classList.add('open');
}

function closeModal() { document.getElementById('overlay').classList.remove('open'); modalNo=null; }
function closeModalOut(e) { if(e.target===document.getElementById('overlay')) closeModal(); }

function saveModal() {
  const c = CONTAINERS_RAW.find(x=>x.no===modalNo);
  if (!c) return;
  const st = appState[c.cntr];
  const newSeal = document.getElementById('mSeal').value.trim();
  const newDamage = document.getElementById('mDamage').value.trim();
  const newSpec = document.getElementById('mSpec').value;
  const newXraySeal = document.getElementById('mXraySeal').value.trim();
  let changed = false;
  // 실번호 수정
  if (newSeal && newSeal !== st.seal) {
    const old = st.seal;
    st.sealLog = st.sealLog||[];
    st.sealLog.push({type:'seal',time:now(),user:currentUser,from:old,to:newSeal});
    st.seal = newSeal;
    post({action:'seal_edit',cntr:c.cntr,newSeal:newSeal,editUser:currentUser});
    changed = true;
  }
  // XRAY 세관봉인 실번호
  if (newXraySeal && newXraySeal !== (st.xraySeal||'')) {
    st.xraySeal = newXraySeal;
    post({action:'xray_seal_edit',cntr:c.cntr,xraySeal:newXraySeal,editUser:currentUser});
    changed = true;
  }
  // 데미지 수정
  if (newDamage !== st.damage) {
    st.damage = newDamage;
    post({action:'damage_edit',cntr:c.cntr,damage:newDamage,editUser:currentUser});
    changed = true;
  }
  // 특수화물 수정
  if (newSpec !== (st.spec||'')) {
    st.spec = newSpec;
    post({action:'spec_edit',cntr:c.cntr,spec:newSpec,editUser:currentUser});
    changed = true;
  }
  if (changed) saveState();
  closeModal();
  renderList();
}

function toggleCheck() {
  const c = CONTAINERS_RAW.find(x=>x.no===modalNo);
  if (!c) return;
  const st = appState[c.cntr];
  // 저장 먼저
  const newSeal = document.getElementById('mSeal').value.trim();
  const newDamage = document.getElementById('mDamage').value.trim();
  const newSpec = document.getElementById('mSpec').value;
  const newXraySeal = document.getElementById('mXraySeal').value.trim();
  if (newSeal && newSeal !== st.seal) {
    st.sealLog = st.sealLog||[];
    st.sealLog.push({type:'seal',time:now(),user:currentUser,from:st.seal,to:newSeal});
    st.seal = newSeal;
    post({action:'seal_edit',cntr:c.cntr,newSeal:newSeal,editUser:currentUser});
  }
  if (newXraySeal && newXraySeal !== (st.xraySeal||'')) {
    st.xraySeal = newXraySeal;
    post({action:'xray_seal_edit',cntr:c.cntr,xraySeal:newXraySeal,editUser:currentUser});
  }
  if (newDamage !== st.damage) {
    st.damage = newDamage;
    post({action:'damage_edit',cntr:c.cntr,damage:newDamage,editUser:currentUser});
  }
  if (newSpec !== (st.spec||'')) {
    st.spec = newSpec;
    post({action:'spec_edit',cntr:c.cntr,spec:newSpec,editUser:currentUser});
  }
  // 확인 토글
  if (st.checked) {
    st.checked=false; st.checkTime=null; st.checkUser=null;
    post({action:'confirm',cntr:c.cntr,checked:false,checkTime:'',checkUser:currentUser});
  } else {
    st.checked=true; st.checkTime=now(); st.checkUser=currentUser;
    post({action:'confirm',cntr:c.cntr,checked:true,checkTime:st.checkTime,checkUser:currentUser});
  }
  saveState();
  closeModal();
  renderList();
}

// ============ TABS & SEARCH ============
function switchTab(tab, el) {
  curTab = tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderList();
}
function doSearch() {
  searchQ = document.getElementById('srchInput').value.trim().toUpperCase();
  renderList();
}
function toggleXrayFilter() {
  xrayFilter = !xrayFilter;
  document.getElementById('xrayFBtn').classList.toggle('on', xrayFilter);
  renderList();
}

// Init
renderList();
</script>
