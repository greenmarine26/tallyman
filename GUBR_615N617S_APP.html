<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'맑은 고딕',sans-serif;background:#f0f4f8;color:#222;}
/* ── 로그인 ── */
#loginWrap{position:fixed;inset:0;background:linear-gradient(135deg,#1a3a6b,#2e6da4);display:flex;align-items:center;justify-content:center;z-index:9999;}
.login-box{background:#fff;border-radius:16px;padding:32px 24px;width:90%;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,.3);}
.login-title{font-size:18px;font-weight:800;color:#1a3a6b;text-align:center;margin-bottom:4px;}
.login-sub{font-size:12px;color:#888;text-align:center;margin-bottom:24px;}
.login-label{font-size:12px;color:#555;font-weight:700;margin-bottom:6px;display:block;}
.login-inp{width:100%;padding:12px;font-size:16px;border:2px solid #ddd;border-radius:8px;outline:none;margin-bottom:16px;text-align:center;}
.login-inp:focus{border-color:#2e6da4;}
.login-btn{width:100%;padding:14px;background:#1a3a6b;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;}
.login-err{color:#c00;font-size:12px;text-align:center;margin-top:8px;display:none;}
/* ── 헤더 ── */
.hdr{background:linear-gradient(135deg,#1a3a6b,#2e6da4);color:#fff;padding:10px 14px 8px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.hdr-row{display:flex;align-items:center;justify-content:space-between;}
.hdr h1{font-size:14px;font-weight:700;}
.hdr-btns{display:flex;gap:6px;}
.hdr-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:6px;padding:5px 8px;font-size:13px;cursor:pointer;}
.hdr-user{font-size:10px;opacity:.8;margin-top:2px;}
/* ── 통계바 ── */
.sum-bar{background:#1a3a6b;color:#fff;padding:7px 12px;font-size:11px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center;border-top:1px solid rgba(255,255,255,.1);}
.sum-bar span{opacity:.9;}
.sum-bar b{opacity:1;}
.sum-bar .done-cnt{color:#7BFF7B;}
.sum-bar .remain-cnt{color:#FFD700;}
/* ── 검색창 ── */
.search-wrap{padding:10px 12px;background:#fff;border-bottom:1px solid #ddd;position:sticky;top:56px;z-index:99;display:flex;align-items:center;gap:8px;}
#inp{flex:1;padding:10px 14px;font-size:18px;border:2px solid #2e6da4;border-radius:8px;outline:none;letter-spacing:2px;font-weight:700;text-align:center;}
#searchIconBtn{display:none;background:#1F3864;border:none;color:#fff;border-radius:8px;padding:10px 14px;font-size:18px;cursor:pointer;flex-shrink:0;}
/* ── 탭 ── */
.tabs{display:flex;overflow-x:auto;background:#fff;border-bottom:2px solid #e0e8f0;padding:0 8px;gap:4px;scrollbar-width:none;position:sticky;top:112px;z-index:98;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;padding:7px 12px;font-size:12px;font-weight:600;border-radius:6px 6px 0 0;cursor:pointer;border:none;background:transparent;color:#666;}
.tab.active{background:#2e6da4;color:#fff;}
/* ── 결과바 ── */
.result-bar{padding:5px 12px;font-size:11px;color:#666;background:#f8fafc;border-bottom:1px solid #e8edf2;}
/* ── 카드 ── */
.list{padding:8px;}
.card{border-radius:10px;margin-bottom:7px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.1);background:#fff;}
.card.done-card{opacity:.6;}
.card-main{display:flex;align-items:stretch;border-left:5px solid #2e6da4;cursor:pointer;}
.card-main.xray-c{border-left-color:#cc0000;background:#fffef0;}
.card-left{padding:8px 10px;flex:1;min-width:0;}
.card-no{font-size:10px;color:#888;font-weight:600;}
.card-cntr{font-size:15px;font-weight:700;font-family:monospace;letter-spacing:.5px;}
.card-seal{font-size:13px;color:#1a3a6b;font-weight:700;margin-top:2px;font-family:monospace;}
.card-seal.modified{color:#c05000;}
.card-right{padding:8px 10px;text-align:right;display:flex;flex-direction:column;justify-content:space-between;min-width:100px;gap:4px;}
.card-pos{font-size:14px;font-weight:700;font-family:monospace;color:#1a3a6b;background:#e8f0fb;border-radius:5px;padding:2px 6px;display:inline-block;}
.card-oper{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;background:#d9e1f2;color:#1a3a6b;}
.tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;}
.tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;}
.tag.rf{background:#d4edda;color:#155724;}
.tag.xray{background:#cc0000;color:#fff;}
.tag.sp{background:#fff0d0;color:#7a4000;}
/* ── 확인(완료) 버튼 ── */
.chk-btn{background:#28a745;color:#fff;border:none;border-radius:6px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;width:100%;margin-top:4px;}
.chk-btn.done{background:#6c757d;}
.done-badge{background:#28a745;color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:8px;margin-left:4px;}
.undo-btn{background:#dc3545;color:#fff;border:none;border-radius:6px;padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer;}
/* ── 디테일 ── */
.detail{display:none;padding:10px 14px;background:#f8fafc;border-top:1px dashed #ccd;}
.detail table{width:100%;border-collapse:collapse;font-size:11px;}
.detail td{padding:5px 6px;border-bottom:1px solid #eee;vertical-align:middle;}
.detail td:first-child{color:#666;font-weight:600;width:80px;}
/* ── 실번호 수정 ── */
.seal-wrap{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.seal-val{font-size:14px;font-weight:700;font-family:monospace;color:#1a3a6b;}
.seal-val.modified{color:#c05000;}
.edit-btn{background:#fff;border:1px solid #2e6da4;color:#2e6da4;border-radius:5px;padding:2px 8px;font-size:11px;cursor:pointer;}
.edit-inp{display:none;align-items:center;gap:6px;margin-top:4px;}
.seal-input{padding:6px 10px;border:2px solid #2e6da4;border-radius:6px;font-size:14px;font-family:monospace;width:160px;font-weight:700;}
.save-btn{background:#2e6da4;color:#fff;border:none;border-radius:5px;padding:6px 12px;font-size:12px;cursor:pointer;}
.cancel-btn{background:#999;color:#fff;border:none;border-radius:5px;padding:6px 10px;font-size:12px;cursor:pointer;}
.mod-badge{font-size:9px;background:#fff0d0;color:#7a4000;padding:1px 5px;border-radius:8px;font-weight:700;}
/* ── XRAY 봉인SEAL ── */
.xray-banner{background:#cc0000;color:#fff;text-align:center;padding:6px;font-size:12px;font-weight:700;}
.xray-seal-box{background:#fff8f8;border:2px solid #cc0000;border-radius:8px;padding:10px;margin-top:8px;}
.xray-seal-title{color:#cc0000;font-size:11px;font-weight:700;margin-bottom:6px;}
.xray-seal-row{display:flex;align-items:center;gap:6px;}
.xray-seal-inp{padding:6px 10px;border:2px solid #cc0000;border-radius:6px;font-size:13px;font-family:monospace;flex:1;font-weight:700;}
.xray-save-btn{background:#cc0000;color:#fff;border:none;border-radius:5px;padding:6px 12px;font-size:12px;cursor:pointer;}
/* ── 카메라 모달 ── */
#camModal{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.6);flex-direction:column;align-items:center;justify-content:center;padding:0;}
.cam-wrap{width:100%;max-width:420px;background:#000;border-radius:20px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.7);border:1.5px solid rgba(255,215,0,.35);}
.cam-view{position:relative;width:100%;aspect-ratio:1/1;overflow:hidden;background:#000;}
#camVideo{width:100%;height:100%;object-fit:cover;transition:transform .15s;}
#camCanvas{display:none;}
.cam-titlebar{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:linear-gradient(to bottom,rgba(0,0,0,.75),transparent);}
.cam-scan-label{color:#FFD700;font-size:13px;font-weight:800;}
.cam-close-btn{background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.4);color:#fff;border-radius:50%;width:30px;height:30px;font-size:15px;cursor:pointer;}
.cam-guide-wrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;}
.cam-overlay{position:absolute;inset:0;background:rgba(0,0,0,.45);}
.cam-scanbox{position:relative;z-index:1;width:92%;height:30%;border:2.5px solid #FFD700;border-radius:8px;box-shadow:0 0 0 2px rgba(255,215,0,.3);}
.cam-bottom{background:#111;padding:12px 14px;}
.cam-result{color:#FFD700;font-size:13px;font-weight:700;text-align:center;min-height:18px;margin-bottom:8px;}
.cam-guide{color:#aaa;font-size:11px;text-align:center;margin-bottom:10px;}
.cam-zoom-row{display:flex;align-items:center;gap:8px;}
.cam-zoom-label{color:#fff;font-size:11px;font-weight:700;min-width:35px;}
#zoomSlider{flex:1;height:4px;accent-color:#FFD700;}
#zoomVal{color:#FFD700;font-size:11px;font-weight:700;min-width:38px;text-align:right;}
.cam-manual-row{display:flex;gap:6px;margin-top:8px;}
#camManual{flex:1;padding:8px 12px;border:1.5px solid #444;border-radius:8px;font-size:16px;background:#222;color:#fff;text-align:center;letter-spacing:2px;font-family:monospace;}
.cam-manual-btn{background:#2e6da4;color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:14px;cursor:pointer;font-weight:700;}
/* ── 빈 상태 ── */
.empty{text-align:center;padding:40px 20px;color:#aaa;}
/* ── 완료탭 스타일 ── */
.done-info{font-size:10px;color:#28a745;font-weight:700;margin-top:2px;}

.hdr-top{display:flex;align-items:center;justify-content:space-between;}
.hdr-company{font-size:15px;font-weight:800;letter-spacing:.5px;}
.hdr-ship{font-size:10px;opacity:.8;margin-top:2px;}
.hdr-user-row{display:flex;align-items:center;justify-content:space-between;margin-top:6px;padding-top:6px;border-top:1px solid rgba(255,255,255,.2);}
.hdr-user-info{display:flex;align-items:center;gap:8px;}
.hdr-role{font-size:10px;background:rgba(255,255,255,.2);padding:2px 7px;border-radius:10px;font-weight:600;}
.hdr-name{font-size:13px;font-weight:700;}
.logout-btn{background:rgba(255,80,80,.25);border:1px solid rgba(255,120,120,.5);color:#fff;border-radius:8px;padding:4px 10px;font-size:11px;font-weight:600;cursor:pointer;}

.mode-switch{display:flex;gap:0;background:#0d2340;}
.mode-btn{flex:1;padding:8px 4px;font-size:12px;font-weight:700;border:none;background:#0d2340;color:rgba(255,255,255,.5);cursor:pointer;transition:all .2s;}
.mode-btn.active{background:#1F3864;color:#fff;border-bottom:3px solid #4fc3f7;}
.pos-edit-btn{background:none;border:1px solid #aaa;border-radius:4px;padding:1px 4px;font-size:10px;cursor:pointer;margin-left:4px;}

<!-- 로그인 -->
<div id="loginWrap">
  <div class="login-box">
    <div class="login-title">🚢 GUBR 615N/617S 검수</div>
    <div class="login-sub">그린마린 검수팀</div>
    <label class="login-label">이름</label>
    <input class="login-inp" id="loginName" type="text" placeholder="이름 입력" autocomplete="off">
    <label class="login-label">패스워드 (입사년월일 6자리)</label>
    <input class="login-inp" id="loginPw" type="password" placeholder="예: 240508" maxlength="6" inputmode="numeric">
    <button class="login-btn" onclick="doLogin()">로그인</button>
    <div class="login-err" id="loginErr">이름 또는 패스워드가 올바르지 않습니다</div>
  </div>
</div>

<!-- 카메라 모달 -->
<div id="camModal">
  <div class="cam-wrap">
    <div class="cam-view">
      <video id="camVideo" autoplay playsinline></video>
      <canvas id="camCanvas"></canvas>
      <div class="cam-titlebar">
        <div class="cam-scan-label">🔍 자동 스캔중</div>
        <button class="cam-close-btn" onclick="closeCamera()">✕</button>
      </div>
      <div class="cam-guide-wrap">
        <div class="cam-overlay"></div>
        <div class="cam-scanbox">
          <div style="position:absolute;inset:-1px;border:1px dashed rgba(255,215,0,.4);border-radius:7px;"></div>
        </div>
      </div>
    </div>
    <div class="cam-bottom">
      <div class="cam-result" id="camResult"></div>
      <div class="cam-guide" id="camGuide">컨테이너 번호를 박스 안에 맞춰주세요</div>
      <div class="cam-zoom-row">
        <span class="cam-zoom-label">줌</span>
        <input type="range" id="zoomSlider" min="1" max="30" step="0.5" value="1" oninput="setZoom(this.value)">
        <span id="zoomVal">1.0x</span>
      </div>
      <div class="cam-manual-row">
        <input id="camManual" type="tel" placeholder="끝 4자리 직접입력" maxlength="4" inputmode="numeric">
        <button class="cam-manual-btn" onclick="camManualSearch()">검색</button>
      </div>
    </div>
  </div>

function doLogin(){
  var name = document.getElementById('loginName').value.trim();
  var pw   = document.getElementById('loginPw').value.trim();
  var err  = document.getElementById('loginErr');
  if(!name || !pw){ err.style.display='block'; err.textContent='이름과 패스워드를 입력하세요'; return; }

  // localStorage에 저장 (자동로그인)
  localStorage.setItem('gm_gubr615_user', JSON.stringify({name:name, pw:pw}));
  showApp(name);
  err.style.display='none';
  setTimeout(function(){ loadFromSheets(); }, 800);
  render();
}

function showApp(name){
  currentUser = name;
  document.getElementById('loginWrap').style.display='none';
  document.getElementById('appWrap').style.display='block';
  var role = STAFF_DB[name] === STAFF_DB[name] ? '검수원' : '검수';

  // 전체/기타 탭에서는 완료된 것 제외
  if(!!r.checked) return false;
  if(f === 'FULL')  return r.fe === 'F';
  if(f === 'EMPTY') return r.fe === 'E';
  if(f === 'SP')     return !!r.special;
  if(f === 'RF')     return r.special && r.special.indexOf('RF') === 0;
  if(f === 'XRAY')   return !!r.xray;
  if(f === '20DC')   return r.size === '20DC';
  if(f === '20RF')   return r.size === '20RF';
  if(f === '40HQ')   return r.size === '40HQ';
  if(f === '40RF')   return r.size === '40RF';
  if(f === 'SKR')    return r.oper === 'SKR';
  if(f === 'DJS')    return r.oper === 'DJS';
  if(f === 'HAS')    return r.oper === 'HAS';
  return true;
}

function fmtWgt(w){ if(!w) return '-'; return parseInt(w).toLocaleString()+'kg'; }

// ── 카드 렌더 ────────────────────────────────────
function renderCard(r){
  var isDone = !!r.checked;
  var isXray = !!r.xray;
  var isRf   = r.special && r.special.indexOf('RF') === 0;
  var mod    = isModified(r);
  var xraySeal = r.xray_seal || '';

  var mainCls = 'card-main' + (isXray ? ' xray-c' : '');
  var cardCls = 'card' + (isDone ? ' done-card' : '');

  // 태그
  var tags = '<span class="tag" style="background:#e8f4e8;color:#2d7a2d">'+r.size+'</span>';
  if(isXray) tags += '<span class="tag xray">⚠ XRAY</span>';
  if(isRf) tags += '<span class="tag rf">🧊 '+r.special+'</span>';
  else if(!isXray && r.special) tags += '<span class="tag sp">'+r.special+'</span>';

  var xrayBanner = isXray ? '<div class="xray-banner">🔴 XRAY 검사 대상 — 세관봉인 실번호 기록 필요</div>' : '';

  var doneInfo = isDone ? '<div class="done-info">✅ 완료: '+r.checked+'</div>' : '';

  // 확인버튼
  var chkBtnHtml;
  if(isDone){
    chkBtnHtml = '<button class="chk-btn done" onclick="undoCheck('+r.no+');event.stopPropagation()">완료취소</button>';
  } else {
    chkBtnHtml = '<button class="chk-btn" onclick="doCheck('+r.no+');event.stopPropagation()">✔ 확인</button>';
  }

  // XRAY 봉인SEAL
  var xraySealBox = isXray ? (
    '<div class="xray-seal-box">'+
    '<div class="xray-seal-title">🔴 세관봉인 실번호 입력</div>'+
    '<div id="xsv'+r.no+'" class="seal-wrap">'+
      '<span class="seal-val" style="color:#C00000" id="xsval'+r.no+'">'+( xraySeal || '미입력'  )+'</span>'+
      (xraySeal ? '<span class="mod-badge" style="background:#FFE0E0;color:#C00000">입력됨</span>' : '')+
      '<button class="edit-btn" style="border-color:#C00000;color:#C00000" onclick="startXraySeal('+r.no+');event.stopPropagation()">✏️</button>'+
    '</div>'+
    '<div id="xse'+r.no+'" class="edit-inp">'+
      '<input id="xsi'+r.no+'" type="text" placeholder="봉인SEAL 번호" class="seal-input" style="border-color:#C00000" onclick="event.stopPropagation()">'+
      '<button class="save-btn" style="background:#C00000" onclick="saveXraySeal('+r.no+');event.stopPropagation()">저장</button>'+
      '<button class="cancel-btn" onclick="cancelXraySeal('+r.no+');event.stopPropagation()">취소</button>'+
    '</div>'+
    '</div>'
  ) : '';

  return '<div class="'+cardCls+'" id="card'+r.no+'">'+
    xrayBanner+
    '<div class="'+mainCls+'" onclick="tog('+r.no+')">'+
      '<div class="card-left">'+
        '<div class="card-no">No.'+r.no+(mod?'<span class="mod-badge" style="margin-left:4px">수정됨</span>':'')+(isDone?'<span class="done-badge">✅완료</span>':'')+'</div>'+
        '<div class="card-cntr">'+r.cntr+'</div>'+
        '<div class="card-seal'+(mod?' modified':'')+'">'+r.seal+'</div>'+
        doneInfo+
        '<div class="tags">'+tags+'</div>'+
      '</div>'+
      '<div class="card-right">'+
        '<div class="card-pos">'+
          (curMode==='out'
            ? (r.pos||'-')+'<button class="pos-edit-btn" onclick="editPos('+r.no+');event.stopPropagation()">✏️</button>'
            : (r.pos||'-')
          )+'</div>'+
        '<div class="card-oper">'+r.oper+'</div>'+
        chkBtnHtml+
      '</div>'+
    '</div>'+
    '<div class="detail" id="d'+r.no+'">'+
      '<table>'+
        '<tr><td>컨테이너</td><td style="font-family:monospace;font-weight:700">'+r.cntr+'</td></tr>'+
        '<tr><td>실 번호</td><td>'+
          '<div class="seal-wrap" id="sv'+r.no+'">'+
            '<span class="seal-val'+(mod?' modified':'')+'" id="sval'+r.no+'">'+r.seal+'</span>'+
            (mod ? '<span class="mod-badge">수정됨</span>':'') +
            '<button class="edit-btn" onclick="startEdit('+r.no+');event.stopPropagation()">✏️ 수정</button>'+
          '</div>'+
          '<div class="edit-inp" id="se'+r.no+'">'+
            '<input id="si'+r.no+'" type="text" value="'+r.seal+'" class="seal-input" onclick="event.stopPropagation()">'+
            '<button class="save-btn" onclick="saveSeal('+r.no+')">저장</button>'+
            '<button class="cancel-btn" onclick="cancelEdit('+r.no+')">취소</button>'+
          '</div>'+
        '</td></tr>'+
        '<tr><td>규격</td><td>'+r.size+'</td></tr>'+
        '<tr><td>F/E</td><td>'+(r.fe==='F'?'FULL (화물)':'EMPTY')+'</td></tr>'+
        '<tr><td>선내위치</td><td style="font-family:monospace;font-size:14px;font-weight:700;color:#1a3a6b">'+( r.pos||'-' )+'</td></tr>'+
        '<tr><td>중량</td><td>'+fmtWgt(r.wgt)+'</td></tr>'+
        '<tr><td>오퍼레이터</td><td>'+r.oper+'</td></tr>'+
        (r.special?'<tr><td>특수화물</td><td style="color:#b00;font-weight:600">'+r.special+'</td></tr>':'')+
        (r.checked?'<tr><td>검수완료</td><td style="color:#28a745;font-weight:700">'+r.checked+'</td></tr>':'')+
      '</table>'+
      xraySealBox+
    '</div>'+
  '</div>';
}

function editPos(no){
  var r = DATA.find(function(x){ return x.no===no; });
  if(!r) return;
  var newPos = prompt('선내위치 수정 (현재: '+r.pos+')', r.pos);
  if(newPos === null) return;
  newPos = newPos.trim().toUpperCase();
  if(!newPos) return;

  // 중복 위치 체크
  var dup = DATA.find(function(x){ return x.no!==no && x.pos===newPos; });
  if(dup){
    var ok = confirm('[위치중복] 입력위치 ['+newPos+'] 에 No.'+dup.no+' '+dup.cntr+' 이(가) 이미 있습니다. 계속하면 같은 위치에 2개가 됩니다. 그래도 변경하시겠습니까?');
    if(!ok) return;
  }

  r.pos = newPos;
  var card = document.getElementById('card'+no);
  if(card){
    var wasOpen = document.getElementById('d'+no).style.display==='block';
    card.outerHTML = renderCard(r);
    if(wasOpen) document.getElementById('d'+no).style.display='block';
  }
  saveToSheets(no, 'pos', newPos);
}

function updateSumBar(){
  var done   = DATA.filter(function(r){ return !!r.checked; }).length;
  var remain = DATA.length - done;
  document.getElementById('sumDone').textContent   = done;
  document.getElementById('sumRemain').textContent = remain;
  var cntEl = document.getElementById('cntAll'); if(cntEl) cntEl.textContent = DATA.length;

  var cntSP  = DATA.filter(function(r){ return !!r.special; }).length;
  var cntRF  = DATA.filter(function(r){ return r.size==='40RF'; }).length;
  var cntXR  = DATA.filter(function(r){ return !!r.xray; }).length;
  var cntF   = DATA.filter(function(r){ return r.fe==='F'; }).length;
  var cntE   = DATA.filter(function(r){ return r.fe==='E'; }).length;
  var cntHC  = DATA.filter(function(r){ return r.size==='40HC'; }).length;
  var cntDC  = DATA.filter(function(r){ return r.size==='20DC'; }).length;
  var e; 
  e=document.getElementById('cntSP');   if(e) e.textContent=cntSP;
  e=document.getElementById('cntRF');   if(e) e.textContent=cntSP;
  e=document.getElementById('cntXR');   if(e) e.textContent=cntXR;
  e=document.getElementById('cntF');    if(e) e.textContent=cntF;
  e=document.getElementById('cntE');    if(e) e.textContent=cntE;
  e=document.getElementById('cntRFsz'); if(e) e.textContent=cntRF;
  e=document.getElementById('cntHC');   if(e) e.textContent=cntHC;
  e=document.getElementById('cntDC');   if(e) e.textContent=cntDC;
}

function render(){
  var filtered = DATA.filter(function(r){ return matches(r, curQuery, curFilter); });
  document.getElementById('rbar').textContent =
    (curQuery || curFilter !== 'all') ? ('검색결과: '+filtered.length+'개') : ('전체 '+filtered.length+'개');
  if(!filtered.length){
    document.getElementById('list').innerHTML = '<div class="empty">🔍 검색 결과가 없습니다</div>';
  } else {
    document.getElementById('list').innerHTML = filtered.map(renderCard).join('');
  }
  updateSumBar();
}

// ── 확인(완료처리) ────────────────────────────────
function doCheck(no){
  var r = null;
  for(var i=0;i<DATA.length;i++){ if(DATA[i].no===no){ r=DATA[i]; break; } }
  if(!r) return;
  var now = new Date();
  var ts = now.getFullYear()+'.'+(now.getMonth()+1)+'.'+(now.getDate())+' '
           +('0'+now.getHours()).slice(-2)+':'+('0'+now.getMinutes()).slice(-2);
  r.checked = currentUser + ' ' + ts;
  var wasOpen = document.getElementById('d'+no) && document.getElementById('d'+no).style.display === 'block';
  var card = document.getElementById('card'+no);
  if(card) card.outerHTML = renderCard(r);
  if(wasOpen && document.getElementById('d'+no)) document.getElementById('d'+no).style.display = 'block';
  updateSumBar();
  saveToSheets(no, 'checked', r.checked);
}
function undoCheck(no){
  var r = null;
  for(var i=0;i<DATA.length;i++){ if(DATA[i].no===no){ r=DATA[i]; break; } }
  if(!r) return;
  r.checked = '';
  var wasOpen = document.getElementById('d'+no) && document.getElementById('d'+no).style.display === 'block';
  var card = document.getElementById('card'+no);
  if(card) card.outerHTML = renderCard(r);
  if(wasOpen && document.getElementById('d'+no)) document.getElementById('d'+no).style.display = 'block';
  updateSumBar();
  saveToSheets(no, 'checked', '');
}

// ── Google Sheets 연동 ────────────────────────────
function loadFromSheets(){
  var xhr = new XMLHttpRequest();
  xhr.open('GET', GAS_URL+'?action=getData&mode='+curMode, true);
  xhr.onreadystatechange = function(){
    if(xhr.readyState !== 4 || xhr.status !== 200) return;
    try{
      var res = JSON.parse(xhr.responseText);
      if(res.data){
        for(var i=0;i<res.data.length;i++){
          var row = res.data[i];
          for(var j=0;j<DATA.length;j++){
            if(DATA[j].no === row.no){
              if(row.seal) DATA[j].seal = row.seal.trim();
              if(row.xray_seal !== undefined) DATA[j].xray_seal = row.xray_seal;
              if(row.checked) DATA[j].checked = row.checked;
              break;
            }
          }
        }
        render();
      }
    } catch(e){ console.log('Sheets 로드 오류:',e); }
  };
  xhr.send();
}

function saveToSheets(no, field, value){
  var params = 'action=updateSeal&mode='+curMode+'&no='+no+'&field='+field+'&value='+encodeURIComponent(value)+'&user='+encodeURIComponent(currentUser);
  var xhr = new XMLHttpRequest();
  xhr.open('GET', GAS_URL+'?'+params, true);
  xhr.onreadystatechange = function(){
    if(xhr.readyState !== 4) return;
    console.log('Sheets 저장:', field, '=', value);
  };
  xhr.send();
}

var camStream = null, camTimer = null, camBusy = false, camLast = '', currentZoom = 1;

function openCamera(){

  m.style.display = 'flex'; m.style.flexDirection = 'column';

  document.getElementById('camManual').value = '';

function closeCamera(){
  stopCam();

  // 검색창 복원
  document.getElementById('inp').style.display = '';

function startCam(){
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    document.getElementById('camResult').style.color='#FF6B6B';
    document.getElementById('camResult').textContent='📵 카메라 미지원';
    return;
  }
  navigator.mediaDevices.getUserMedia({
    video:{ facingMode:'environment', width:{ideal:1920}, height:{ideal:1080} }
  }).then(function(stream){
    camStream = stream;
    var v = document.getElementById('camVideo');
    v.srcObject = stream;
    v.onloadedmetadata = function(){ v.play(); };
    v.onplaying = function(){ startAutoScan(); };
    setTimeout(function(){ if(!camTimer) startAutoScan(); }, 3000);
  }).catch(function(err){
    document.getElementById('camResult').style.color='#FF6B6B';
    document.getElementById('camResult').textContent='📵 카메라 오류 — 직접 입력해주세요';
  });
}

function stopCam(){
  if(camTimer){ clearInterval(camTimer); camTimer=null; }
  if(camStream){ camStream.getTracks().forEach(function(t){ t.stop(); }); camStream=null; }
  camBusy = false;
}

function startAutoScan(){
  if(camTimer) clearInterval(camTimer);
  var guide = document.getElementById('camGuide');
  if(typeof Tesseract === 'undefined'){
    guide.textContent = '⏳ OCR 로딩 중...';
    var wait = setInterval(function(){
      if(typeof Tesseract !== 'undefined'){
        clearInterval(wait);
        guide.textContent = '🔍 자동 스캔 중...';
        camTimer = setInterval(function(){ if(!camBusy) doOCR(); }, 3000);
      }
    }, 500);
    return;
  }
  guide.textContent = '🔍 자동 스캔 중...';
  camTimer = setInterval(function(){ if(!camBusy) doOCR(); }, 3000);
}

function preprocessCanvas(srcCanvas){
  var w=srcCanvas.width, h=srcCanvas.height;
  var dst=document.createElement('canvas');
  var maxW=1200;
  var scale=w>maxW?maxW/w:1;
  dst.width=Math.round(w*scale);
  dst.height=Math.round(h*scale);
  var ctx=dst.getContext('2d');
  ctx.imageSmoothingEnabled=true;
  ctx.imageSmoothingQuality='high';
  var z=currentZoom||1;
  var contrast,brightness,saturate;
  if(z<=3){contrast=1.3;brightness=1.0;saturate=1.0;}
  else if(z<=10){contrast=1.6;brightness=1.05;saturate=0.8;}
  else{contrast=2.0;brightness=1.1;saturate=0.5;}
  ctx.filter='contrast('+contrast+') brightness('+brightness+') saturate('+saturate+')';
  ctx.drawImage(srcCanvas,0,0,dst.width,dst.height);
  ctx.filter='none';
  if(z>=10){
    var imgData=ctx.getImageData(0,0,dst.width,dst.height);
    var d=imgData.data;
    for(var i=0;i<d.length;i+=4){
      var gray=0.299*d[i]+0.587*d[i+1]+0.114*d[i+2];
      var bin=gray>128?255:0;
      d[i]=d[i+1]=d[i+2]=bin;
      d[i+3]=255;
    }
    ctx.putImageData(imgData,0,0);
  }
  return dst;
}

function doOCR(){
  var video=document.getElementById('camVideo');
  var canvas=document.getElementById('camCanvas');
  if(!video.srcObject||video.paused||video.videoWidth===0){ return; }
  camBusy=true;
  var el=document.getElementById('camResult');
  var guide=document.getElementById('camGuide');
  var vw=video.videoWidth, vh=video.videoHeight;
  var cropX=Math.round(vw*0.02);
  var cropW=Math.round(vw*0.96);
  var cropY=Math.round(vh*0.25);
  var cropH=Math.round(vh*0.50);
  canvas.width=cropW; canvas.height=cropH;
  var ctx=canvas.getContext('2d');
  ctx.drawImage(video,cropX,cropY,cropW,cropH,0,0,cropW,cropH);
  var processed=preprocessCanvas(canvas);
  Tesseract.recognize(processed,'eng',{
    logger:function(){},
    tessedit_char_whitelist:'0123456789',
    tessedit_pageseg_mode:'7',
    preserve_interword_spaces:'0'
  }).then(function(r){
    var nums=r.data.text.replace(/[^0-9]/g,'');
    var found=findByNumbers(nums);
    if(found){
      var match=null;
      for(var i=0;i<DATA.length;i++){ if(DATA[i].cntr===found){ match=DATA[i]; break; } }
      if(match && found!==camLast){
        camLast=found;
        el.textContent='✅ '+match.cntr+' 인식됨!';
        el.style.color='#FFD700';
        guide.textContent='✅ 찾았습니다!';
        if(navigator.vibrate) navigator.vibrate([80,40,80]);
        setTimeout(function(){ applySearch(match.cntr); closeCamera(); }, 700);
      }
    } else {
      el.textContent='';
      guide.textContent='🔍 자동 스캔 중...';
    }
    camBusy=false;
  }).catch(function(){ camBusy=false; });
}

function findByNumbers(nums){
  if(nums.length<4) return null;
  if(nums.length>=7){
    for(var s=0;s<=nums.length-7;s++){
      var sub7=nums.substr(s,7);
      for(var i=0;i<DATA.length;i++){
        if(DATA[i].cntr.slice(-7)===sub7) return DATA[i].cntr;
      }
    }
  }
  if(nums.length>=4){
    for(var s=0;s<=nums.length-4;s++){
      var sub4=nums.substr(s,4);
      var matches=[];
      for(var i=0;i<DATA.length;i++){
        if(DATA[i].cntr.slice(-4)===sub4) matches.push(DATA[i].cntr);
      }
      if(matches.length===1) return matches[0];
    }
  }
  return null;
}

function setZoom(val){
  var v=parseFloat(val);
  currentZoom=v;
  document.getElementById('zoomVal').textContent=v.toFixed(1)+'x';
  var video=document.getElementById('camVideo');
  if(!camStream){ video.style.transform='scale('+v+')'; video.style.transformOrigin='center center'; return; }
  var track=camStream.getVideoTracks()[0];
  var caps=track&&track.getCapabilities?track.getCapabilities():{};
  if(caps.zoom){
    var hwMax=caps.zoom.max, hwMin=caps.zoom.min;
    if(v<=hwMax){
      var z=hwMin+(hwMax-hwMin)*((v-1)/29);
      track.applyConstraints({advanced:[{zoom:z}]}).catch(function(){});
      video.style.transform='scale(1)';
    } else {
      track.applyConstraints({advanced:[{zoom:hwMax}]}).catch(function(){});
      var cssScale=v/hwMax;
      video.style.transform='scale('+cssScale+')';
      video.style.transformOrigin='center center';
    }
  } else {
    video.style.transform='scale('+v+')';
    video.style.transformOrigin='center center';
  }
}

function applySearch(cntr){
  var last4=cntr.slice(-4);
  document.getElementById('inp').value=last4;
  curQuery=last4; render();
  setTimeout(function(){
    var c=document.querySelector('.card');
    if(c) c.scrollIntoView({behavior:'smooth'});
  },300);
}

function camManualSearch(){
  var v=document.getElementById('camManual').value.replace(/\D/g,'').slice(-4);
  if(v.length<4){ alert('끝 4자리를 입력하세요'); return; }
  closeCamera();
  document.getElementById('inp').value=v;
  curQuery=v; render();
  setTimeout(function(){
    var c=document.querySelector('.card');
    if(c) c.scrollIntoView({behavior:'smooth'});
  },300);
}

render();
